body:
  text: 卷之二草部一甘草產熱河綏遠者最佳老者黑色名鐵甘草功力尤勝主治生者益胃氣通小便解百藥毒入汗劑解肌表寒熱入涼劑瀉內外邪熱入峻劑能使姜附無僭上之患硝黃無峻下之病灸者宜入和劑補益臟腑氣血安神志甘草瀉心湯甘草四兩黃芩三兩黃連一兩乾薑三兩半夏洗一兩大棗十二枚水一斗煮六升去滓再煮三升溫服一升日三次治傷寒誤下胸痞嘔利脾胃虛損按此藥功用至多大要以解毒和胃安神去熱為主凡治各疾用海藻昆布者尤宜佐以生草使胃不滯黃耆主治補虛壯氣強心益胃凡病呈衰弱之證皆宜用之即癰疽發背防其內陷亦宜重用此藥生者能表能補炙者補而不表黃耆人參湯黃耆炙人參白朮炒陳皮麥冬去心當歸身酒拌甘草炙補曲炒五味子杵各一錢黃柏酒洗炒升麻各四分蒼朮米泔浸炒五分水二鍾加生薑三片大棗二枚煎至一鍾去滓空心溫服忌一切激刺飲食治癰疽膿血大泄或食少發熱或作痛少寐服後痛減大便不實者去蘖冬心下痞悶加黃連三分胃脘當心痛減大寒藥加草豆蔻仁五分脅下痛或縮急加柴胡二三分頭痛目中流火加黃連二三分川芎三分頭目不清利上壅上熱者加蔓荊子川芎各三分藁本生地各二分北細辛一分氣短精神少夢寐間困弱無力加五味子九粒大便澀滯食少加當歸身生地各五分桃仁去皮尖研三粒麻子仁研泥五分大便又不通快加製大黃五分胸中氣滯加青皮氣滯太甚加木香縮砂仁各二三分白豆蔻二分腹痛不惡寒者加芍藥五錢黃芩二分減五味子水四盞煎至一盞一服便效黃耆內托散黃耆當歸川芎各二錢白朮土炒銀花皂角刺天花粉各一錢澤瀉甘草各五分水二鍾煎至八分食前服治便毒初起腫甚黃耆四物湯黃耆人參白朮茯苓芍藥甘草生薑當歸地黃川芎多加銀花煎服補氣血黃耆散黃耆牡蠣煨生地各等分研末水煎不拘時服治虛熱盜汗按生耆有化膿去熱平血壓之功向皆目為補氣之藥實未盡其功用人參舊時本草所載皆指黨參今分為吉林上黨高麗三種吉林參產長白山野生者不易得近人收參子種之一二年即肥大又以糖水煮熟曬乾出售一煮即爛功力至微故吉林參必求野山者方佳能得生參尤善蓋採參者深入亂山得後防其變壞且出山後收藏亦至不易故必煮熟也上黨參產山西亦是種參功力日薄高麗參產朝鮮與吉林參略同野生亦少主治強心臟補脾胃安神此藥功力無限不論何病凡屬心臟衰弱均可服用惟實邪宜攻者當忌人參丸人參鹿角膠炒熟地芍藥當歸白朮川芎各等分研末蜜丸梧子大食前米湯下三十丸補虛養陰生血人參半夏丸人參五錢半夏一兩茯苓天南星薄荷各五錢寒水石白礬姜屑各一兩蛤粉二兩藿香二錢半一方加黃連二錢黃柏二兩研末水煮麵糊為丸梧子大食後薑湯下三十丸化痰墜涎止嗽定喘治一切痰逆嘔吐人參平肺散人參炙草地骨皮茯苓天門冬去心各一錢青皮陳皮各六錢知母炒一錢半五味子捶碎炒三十粒桑白皮炒二錢水二鍾加生薑五片煎至一鍾食後稍遠溫服如熱甚加黃芩薄荷葉各一錢治肺痿胸膈痞滿咳嗽喘嘔人參生犀散人參羚羊角鎊地骨皮秦艽麥門冬去心枳殼麩炒大黃蒸柴胡去蘆赤茯苓赤芍桑白皮炒黃耆鱉甲醋炙炒各等分研末每服二錢水半盞加烏梅半個煎至三分不拘時服治小兒骨蒸肌瘦頰赤口乾潮熱盜汗煩躁及大病後餘毒不解人參白虎湯人參石膏知母天花粉葛根麥門冬竹葉粳米水煎服治熱渴又方人參五錢石膏一兩知母七錢甘草四錢水煎食後溫服治膈消上焦煩渴不欲多食人參回生再造丸人參當歸川芎黃連羌活防風玄參酒炒藿香炒白芷炒茯苓炒麻黃炒天麻炒萆薢炒薑黃炒炙草肉桂勿見火白豆蔻仁勿見火何首烏料豆水拌蒸九次琥珀另研黃耆蜜炙大黃酒蒸草豆蔻仁另研雄鼠糞熟地穿山甲前後四足各用五錢麻油浸炙各二兩水安息蘄蛇小者佳去骨並頭尾三寸酒浸炙取淨末各四兩干全蠍去頭尾足威靈仙酒炒葛根炒桑寄生烘乾各二兩五錢細辛赤芍炒烏藥酒炒青皮麩炒於朮土炒殭蠶洗炒乳香去油沒藥去油辰砂骨碎補酒炒香附去皮毛酒炒天竺黃白附子切片制龜板炙沉香母丁香膽星各一兩紅花酒浸烘乾犀角尖各八錢川樸地龍炙乾松香煮九次各五錢木香勿見火梅花冰片西牛黃各二錢五分血竭八分虎脛骨炙酥一對研末蜜丸每丸重一錢金箔為衣蠟殼封固每服一丸生薑湯下治中痰中風口眼歪斜手足拘攣言語不清左癱右瘓筋骨疼痛半身不遂步履艱難人參蛤蚧散人參二兩蛤蚧一對浸五宿逐日換水去腥炙黃杏仁五兩去皮尖炒炙草三兩茯苓貝母去心知母酒炒桑白皮薑汁和蜜炙各二兩研末每服三錢茶湯蜜水下均可治肺痿失音咳吐膿血四君子湯人參一錢白朮二錢白茯苓一錢炙草五分姜三片水二鍾煎至一鍾溫服治脾胃氣虛不思飲食諸病按古方中所用人參皆今之黨參亦可酌量病情改用吉林高麗所產者沙參產北地者良南方者力薄故有南北之分主治瀉肺火清肺熱補中益氣婦人白帶沙參麥冬湯沙參麥冬各三錢玉竹二錢生草一錢冬桑葉生扁豆天花粉各一錢半水五杯煮取二杯日再服治燥傷肺胃陰分或熱或咳久熱久咳者加地骨皮三錢參鬚吉林參之細根也固牙補腎方生熟石膏各五錢甘松山李青鹽參鬚各三錢細辛寒水石各二錢升麻一錢半北五味五十粒蓽澄茄四十五粒研末每晨擦牙漱口嚥下亦可珠參產滇中姚安府主治補肺降火滋陰養血濟陰保元湯珠參三錢米仁四兩拌蒸透切片再入姜加米仁汁蒸曬乾生地一兩砂仁酒姜二味拌蒸九曬焙炭當歸丹參酒洗茺蔚子酒蒸透各四錢白芍酒炒香附姜醋土鹽童便甘草人乳逐次制過女貞子白芥車前水浸透各三錢川芎二錢去淨油米泔水浸曬乾酒浸白朮五錢陳土炒水煎服理脾生血引氣為調經聖藥血熱加丹皮生地寒者加肉桂數分經閉加牛膝西洋參主治滋肺養胃生滓退熱清虛燥之火肺虛咳嗽腸紅下血亦可浸酒常服東洋參功用略同西洋參惟不能清熱有火者忌之人參三七主治活血止血補血七寶散龍骨象皮血竭人參三七乳香沒藥各等分研末酒服並摻傷處治刀杖傷桔梗主治消痰順氣止咳祛肺部風熱桔梗二陳湯桔梗茯苓陳皮半夏甘草枳殼黑山梔黃芩黃連煎服治火喘桔梗散桔梗不拘多少銼碎微炒研末每服三錢不拘時米湯下治肺癰按凡咳症此為要藥知母引經上行則用酒浸焙乾下行則用鹽水潤焙主治去熱清肺安神滋腎消痰止渴熱勞骨蒸知母散知母黃芩各七錢半柴胡去苗生乾地黃各一兩赤芍麥冬去心射干川升麻各七錢半炙草五錢研粗末每服四錢水一中盞加生薑五釐淡竹葉廿七片煎至六分去滓不拘時溫服治婦人熱勞四肢頭疼咽喉不利少思飲食又方知母貝母柴胡黃耆炙紫菀洗馬兜鈴杏仁半夏桑白皮炙白礬款冬花各等分研細末每服一錢水七分盞煎至三分去滓不拘時服或生薑自然汁煮糊為丸梧子大每服五七丸生薑湯下治久咳不止痰喘氣溢知母飲知母麥冬去心赤茯苓各一錢半黃芩黃耆各二錢甘草一錢水二杯加桑白皮五分煎至一杯入竹瀝少許煎二三沸不拘時服治妊娠心脾壅熱目赤口渴煩悶多驚又方知母炒車前子茺蔚子各二錢五味子五分大黃黃芩桔梗各一錢研末水二盞煎至一盞去滓食後溫服治逆順眼翳肉蓯蓉產河套者良沿河野生土人採之煮粥同食主治補腎潤腸滋陰益精陽痿遺泄婦人絕陰不產蓯蓉丸蓯蓉酒浸一宿刮去皺皮炙乾菟絲子酒浸三日曝乾別研為末各二兩熟地鍾乳粉天雄泡去皮五味子桂心人參乾薑炮白朮遠志去心杜仲去心皮炙黃巴戟去心牛膝去苗山茱萸去核覆盆子川椒去目及合口者炒出汗各一兩炙草五錢天門冬去心焙一兩五錢研末蜜丸梧子大每服三十丸空腹溫酒下益精神壯氣血駐容顏烏鬚髮又方蓯蓉八兩熟地六兩五味子四兩菟絲子搗碎二兩研末酒煮山藥和丸梧子大每服七十粒鹽湯或酒空腹下治稟賦虛弱小便頻數蓯蓉五子丸蓯蓉酒浸四兩生熟地各三兩菟絲子蛇床子覆盆子枸杞子車前子各二兩白茯苓三兩續斷生黃耆破故紙各一兩五錢研末蜜丸梧子大每空腹服五七十丸廣嗣衍家精滑者加龍骨五味子各一兩陽衰者加淫羊藿一兩按此藥補而不峻故名從容列當鎖陽功用相同而列當較弱亦有潤腸消炎之功術分於朮白朮蒼朮三種於朮產於潛山中野生者良種者力薄野者極難得銼粉煎湯味盡而香氣仍在不必定有硃砂點也現市者名湖廣珠產江西湖南山中剖開有硃砂點者良主治大益脾胃生津止痛亦有表散發汗通便之功北有參南有術誠世間寶藥也四制仙術散於朮四兩一兩黃耆煎汁炒一兩牡蠣粉炒一兩麩皮湯炒一兩石斛湯炒只用術為末每服三錢粟米湯下治盜汗不止白朮為脾胃要藥脾胃之病十有七八當以此藥為君兼有祛熱逐水益精液利小便之功白朮丸白朮二錢人參黃耆茯苓各一錢山藥百合各七分五釐甘草五分前胡柴胡各二分五釐研細末生薑三片大棗二枚煎湯和丸熱湯下治脾胃氣虛又方白朮一兩五錢南星半夏各一兩研末湯浸蒸餅和丸梧子大每服五七十丸食後生薑湯下治濕痰咳嗽白朮木香散白朮豬苓去皮檳榔赤茯苓澤瀉各一錢五分木香甘草各一錢官桂七分滑石三錢陳皮二錢水二鍾加生薑三片煎至一鍾食前服治喘嗽腫滿變成水病不得臥小便秘白朮芍藥湯白朮芍藥炒各二錢炙草一錢煎服治脾經受濕水泄注下體重腹滿形體倦怠不欲飲食或暴泄無數水穀不化白朮附子湯白朮附子炮去皮臍蒼朮陳皮厚朴薑製半夏茯苓澤瀉各一兩豬苓五錢肉桂四錢銼如豆大每服五錢水三杯加生薑三片煮至一杯去滓食前溫服量虛實加減治脾胃停滯濕壅腫脹白朮散白朮一兩二錢五分牡蠣煅三錢防風二兩五錢研末每服一錢治虛汗少氣白朮黃芩湯白朮一兩黃芩七錢甘草三錢分三服煎溫服治痢後調和腸胃白朮黃耆湯白朮二錢黃耆三錢防風一錢五分水煎食前服治虛汗白朮當歸丸白朮當歸木香等分研末蜜丸梧子大每服一丸木香湯化下治小兒腹痛夜啼身體躽張如癇吐哯不止大便酸臭蒼朮主治健胃安脾發汗消穀解鬱及霍亂吐下嘔逆凡祛風發汗攻郁逐邪力過白朮健胃補脾則遜白朮蓋此術實戰將也蒼朮丸生蒼朮另研不拘多少乳香另研沒藥另研各二錢川牛膝酒浸青鹽研各五錢熟艾米糯過研四錢全蠍炒一錢川烏炮去皮臍三錢研末入研藥令勻以木瓜大者一枚切頭作蓋去瓤納藥末瓜內將蓋簽定置黑豆中蒸令極爛取出去皮同藥研成膏再入蒼朮末拌令得所丸梧子大每服五十丸空腹木瓜湯或鹽湯或酒下日三次忌酒肉治乾溼腳氣筋脈拘痛不能行動兼補下部乾坤生意平補固真丹蒼朮刮淨一斤作四分一分川椒一兩炒一分破故紙一兩炒一分茴香食鹽各一兩炒一分川楝肉一兩炒取淨術為末入白茯苓末二兩酒洗當歸末二兩酒煮麵糊丸梧子大每空腹鹽酒下三十丸治元臟久虛遺精白濁婦人赤白帶下崩漏蒼朮羌活湯蒼朮制羌活黃芩枳殼半夏柴胡川芎陳皮各等分甘草減半生薑三片水煎溫服治瘴癘腹滿寒熱蒼朮香附丸蒼朮香附三稜神麯厚朴薑製生地蓬莪朮當歸各二兩明礬八兩麩炒黑色研細末水丸梧子大每服二三十丸熟湯下治婦人氣塊狗脊有二種一根黑