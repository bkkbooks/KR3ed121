body:
  text: 卷之三草部二當歸主治和血補血破瘀舒筋療癰疽金瘡尤能使子宮健全故婦女一切病有關子宮者必以此藥為主當歸丸當歸赤芍熟地川芎蓬莪朮京三稜各三錢五分神麯百草霜各二錢五分研末酒丸梧子大每服二三錢熟湯下治經水不調血積當歸川芎散當歸川芎柴胡白芍白朮各一錢梔子炒一錢二分丹皮茯苓各八分蔓荊子甘草各五分水煎服治血虛瘡症或風熱耳內癢痛生瘡出水或頭目不清寒熱食少婦女經水不調胸膈不利腹脅痞痛凡肝氣實者去白朮加柴胡黃芩氣血虛去柴胡梔子蔓荊子加人參黃耆地黃倍當歸脾虛飲食少去柴胡梔子蔓荊子加茯苓白朮脾虛胸膈不利加人參黃耆痰滯胸膈不利加白朮半夏肝氣不順胸膈不利或小腹痞滿時時攻痛去當歸白朮加青皮肝血不足胸膈不利或小腹痞滿或時作痛去梔子加熟地肝血虛寒小腹時痛加肉桂日晡發熱加地黃倍當歸當歸六黃湯當歸生地炒熟地黃柏黃芩黃連三味均炒黑各一錢黃耆炒二錢水二杯煎至一杯臨臥服不效加人參白朮治血虛盜汗內熱晡熱如心血不足加酸棗仁炒當歸木香湯當歸一兩木香五錢青皮五加皮陳皮海桐皮丁香皮桑白皮地骨皮丹皮棕櫚皮煨存性各一兩赤芍五錢研末每服一錢水一盞入香油一二滴或用古錢一枚洗淨入之煎至七分不拘時溫服治婦人血氣虛勞頭目昏眩音聲沉重舌根強硬言語謇澀困睡盜汗恍惚驚悸面色萎黃喘嗽頻發遍身疼痛腳氣走注四肢困憊背胛拘急時發寒熱五心煩躁唇乾多渴胸膈不利咽喉噎塞尫羸瘦弱當歸玄胡索湯當歸尾玄胡索各一錢五分五靈脂蒲黃各一錢赤芍肉桂紅花各五分水酒各一盞煎至一盞入童便一盞同服或用山楂肉一兩水煎一鍾加紅砂糖五六錢好酒一二小杯空腹時熱服治婦人産後腹中有塊上下時動痛不可忍當歸芍藥湯歸身白芍白朮蒼朮米泔水浸去皮各五錢黃耆一兩五錢炙草生地各三分柴胡二分熟地陳皮各五分研粗末分作二服水煎空腹服治婦人勞役過度脾胃虛弱氣短自汗身熱煩悶不思飲食四肢無力大便時瀉崩中漏下當歸和血散當歸二錢乳香五分沒藥一錢五分白芍三錢研細末每服一錢水煎溫服治瘡瘍未發出內痛不可忍及産前産後腹痛當歸散當歸黃芩芍藥川芎各一斤白朮八兩研末酒下方寸匕日再服清熱安胎妊娠宜常服並治産後百病又方當歸川芎白芍炒黃芩炒各一兩白朮山茱萸肉各一兩五錢研末每服二錢空腹溫酒下日三次治經水不調或三四日一行或一月數行如冷去黃芩當歸湯當歸麻黃附子細辛防風獨活等分水酒煎服治賊風口噤角弓反張成痙口不開者撬口灌之一服當蘇二服小汗三服大汗當歸黃耆湯當歸黃耆地黃川芎地骨皮芍藥各五分水煎服治瘡瘍痛不可忍發熱加黃芩煩躁不睡加梔子作嘔加白朮又方當歸二錢黃耆酒浸三錢人參升麻各二錢甘草一錢水煎服日三次治陰脫芎藭産川中者名川芎今通用之産江西撫州者名撫芎主治行血祛風壯筋骨破癥結驅宿血養新血中風中惡頭痛婦人經閉崩中腦癰發背芎藭湯川芎黃耆白芍乾地黃吳茱萸炙草各二兩當歸乾薑各一兩水一斗煎取三升分三服治風寒冷熱勞損衝任月經不調崩中帶下腰重裡急淋瀝不斷或妊娠胎動不安下血連日小便頻數肢體煩倦頭暈目暗不欲飲食或産後崩漏下血不止若經後有赤白帶下者去地黃吳茱萸加人參杜仲各二兩芎術丸川芎三錢五分蒼朮白朮各五錢枳殼甘草白茯苓桔梗各三錢五分烏藥威靈仙陳皮羌活白芷當歸黃芩蒼耳子秦艽杜仲熟地香附海風藤牛膝木瓜防風紅花薏仁荊芥各五錢川烏草烏各一錢白花蛇一寸用麻袋入藥盛酒罈內封固隔湯煮半日許候透埋土中一日夜去火每日不拘時服一茶杯服盡愈治痛風及諸風芎辛湯芎藭細辛生附子去皮生烏頭去皮天南星薑湯泡去涎生乾薑各一錢炙草五分生薑七片芽茶一撮水煎放涼臨臥服面赤戴陽加蔥白二莖童便半杯不應加黃連酒炒三分治寒厥頭痛又方川芎一錢五分細辛五分炙草六分生薑五片水煎食後熱服治熱厥頭痛有熱加黃芩酒炒一錢五分不應加生石膏三錢烏頭二分胃虛者去白芷加白朮芎葛湯川芎乾葛桂枝枳殼麩炒細辛芍藥麻黃人參防風各五錢炙草二錢為粗末每服五錢水二鍾加生薑三片煎至七分去滓溫服日三次有汗避風治風寒脅痛芎歸膠艾湯川芎二兩當歸三兩阿膠二兩艾葉炒三兩炙草二兩乾地黃六兩白芍四兩水五升清酒三升合煮取三升去滓納膠令消盡溫服一升日三次不瘥更服治妊娠腹痛胞阻胎漏及妊娠下血或半産後下血不絶芎藭散川芎前胡白殭蠶炒人參各一兩蔓荊子天麻酒浸焙防風各五錢研末每服二錢食後溫酒下治頭風眩暈目昏痛體倦心忪芎蘇散川芎一錢蘇葉柴胡各二錢葛根枳殼桔梗陳皮半夏茯苓各一錢炙草七分生薑三片大棗一枚研末每服五錢水煎去滓溫服治感冒偏於血分及妊娠傷寒如喘嗽加杏仁桑皮芎歸飲當歸二兩或三兩酒浸洗撫芎一兩水二碗酒一碗半煎至八分作二次服治因傷失血湧吐及跌打隕墜致傷脈絡令血大吐者如有瘀血或加大黃下之或加桃仁紅花破之或加鬱金黃酒行之審證酌定蛇床子主治溫中益陽腰胯痠疼婦人陰寒此為壯陽暖陰之藥與菟絲枸杞可以參用白芷主治祛風燥濕發表破瘀止痛排膿大腸風祕小便失血婦人血風眩暈血崩腰痛神白散白芷一兩生草半兩姜三片蔥白三寸棗一枚豉五十粒水二碗煎服取汗不汗再服治傷寒不汗至十餘日者白芷暖宮丸白芷七錢五分禹餘糧制一兩乾薑炮芍藥川椒制阿膠蛤粉炒艾葉制川芎各七錢五分研末蜜丸梧子大每服四十丸溫酒或醋湯下暖血海白芷散白芷吳茱萸各四分麻黃草豆蔻各一錢五分黃耆桂枝各二錢五分藁本三分羌活八分當歸熟地各五分升麻一錢研末嗽口淨以末擦之治大寒犯腦齒痛又方白芷防風連翹石膏煅荊芥赤芍升麻焙薄荷研末薄荷湯下又用末擦牙齦治下床牙痛偏正頭風百藥不效者白芷炒二兩五錢川芎炒甘草炒川烏半生半熟各一兩為末每服一錢薄荷湯下神效毒蛇傷螫者以麥冬湯調白芷末一斤灌之咬處水洗淨挹干以白芷末入膽礬麝香少許摻之當有惡水湧出至毒盡止芍藥白花者根為白芍紅者為赤芍主治瀉肝斂陰養血散瘀定痛婦人經閉胎前産後諸症止下痢腹痛後重向有白補赤瀉白收赤散之論李瀕湖則主白能益脾兼於土中瀉木赤能散邪可行血中之滯近世用者多從李說芍藥甘草附子湯芍藥炙草各三兩附子一枚泡去皮水五升煎至一升五合分三次溫服治太陽證發汗不解反惡寒及瘡家發汗成瘰若營血受傷肢攣厥逆熱不止者去附子煎湯再服芍藥梔豉湯芍藥當歸梔子各五錢香豉五勺水煎服治産後虛煩不眠芍藥湯白芍炒二兩當歸尾黃連炒黃芩炒各五錢檳榔木香炙草各三錢或加肉桂二錢五分或加桃仁五粒去皮尖㕮咀每服五錢水二杯煎至一杯去滓溫服治痢下膿血及後重窘痛如痢不減加大黃三錢便後臟毒加黃柏二錢芍藥補氣湯白芍一兩五錢黃耆陳皮炙草各一兩澤瀉五錢每服一兩水二大盞煎至一盞去滓溫服補氣白芍散白芍牡蠣乾薑熟地桂心黃耆烏賊魚骨鹿角膠龍骨各一兩研末每服二錢食前溫酒調下治産後崩中下血淋瀝不絶黃瘦虛損赤芍湯赤芍石膏犀角鎊麥冬薺苨木通各二兩朴硝升麻玄參生草各一兩㕮咀每服五錢水一盞半煎至八分去滓不拘時溫服治胃脘積熱為癰芍藥蒺藜煎赤芍二錢白蒺藜連刺捶碎五錢甚者一兩黃芩龍膽草木通山梔澤瀉各一錢五分生地二錢水煎服治濕熱瘡疹及下部諸熱瘡如火不甚者去龍膽山梔丹皮以單葉紅花生山中者採根入藥為良主治涼血和血破瘀止痛通關腠血脈排膿衄血吐血牡丹散丹皮赤芍地榆苦桔梗薏仁川升麻黃芩生草各一錢五分水二鍾煎至一鍾食遠溫服治肺癰又方丹皮一兩乾漆炒二兩蘇木蓬莪朮鬼箭各一分甘草當歸桂心芍藥延胡索炒陳皮紅花沒藥另研烏藥各一兩㕮咀每服三錢水一盞煎至七分不拘時溫服治虛損經閉潮熱體羸漸成骨蒸者又方丹皮人參天麻白茯苓黃耆炒木香當歸川芎官桂桃仁去皮炒各七錢五分白芷炒薏仁炙草各五錢研末每服三五錢水一鍾煎至七分食前溫服治腸癰冷證腹濡而痛時時痢膿或下血牡丹湯丹皮栝蔞仁各一錢桃仁去皮尖芒硝各二錢大黃五錢水二鍾煎至一鍾去滓入硝再煎數沸不拘時服治腸癰小腹腫痞按之即痛小便如淋發熱自汗惡寒脈遲緊按此藥凡因血熱而起諸症若喉痛肺熱腸炎均可用之木香産嶺南者良主治通氣止各種痛助胃開鬱功在宣散血枯陰虛者忌之木香丸木香蟬殼微炒去腳麝香細研黃連黃丹微炒熊膽研入夜明砂微炒乾蟾塗酥炙微焦各一分赤石脂五錢肉豆蔻一顆去殼田父五錢炙令微黃研末水浸蒸餅和丸麻子大每服二丸量兒大小加減治內疳木香化滯湯木香紅花各三錢橘皮歸尾枳實炒各二錢柴胡四錢草豆蔻研炙草各五錢半夏一兩每服三五錢加生薑五片水煎食遠服調氣益氣治脾胃虛弱食滯腹痛心下痞滿不思食胸滿加枳殼桔梗砂仁腹脹滿加厚朴倍枳實小腹痛甚加青皮尖檳榔氣痛加烏藥熱加黑山梔易怒加黑山梔倍柴胡木香半夏丹木香半夏肉豆蔻各一兩藿香葉丁香白朮各五錢研末生薑汁和丸黍米大每服十丸人參湯下量兒大小加減治胃寒咳嗽木香流氣飲木香研五分當歸白芍酒炒川芎紫蘇桔梗枳實麩炒烏藥陳皮半夏白茯苓黃耆防風青皮各一錢大腹皮檳榔枳殼麩炒澤瀉甘草節各五分加生薑三片紅棗二枚水煎服宣氣滯治疔毒毒在下部加牛膝木香通氣散木香戎鹽炒京三稜炮各五錢厚朴一兩枳實麩炒炙草各三錢乾薑炮蓬莪朮煨各二錢研末每服三錢食前薑湯下治寒氣結症腹大堅滿痛不可忍高良薑主治下氣祛風健脾胃霍亂轉筋子名紅豆蔻散寒燥濕李東垣脾胃藥中常用之高良薑丸高良薑當歸檳榔羌活威靈仙各七錢五分牽牛炒蘿蔔子炒各二兩桂心陳皮各五錢研末蜜丸梧子大每服三四十丸不拘時溫酒送下以利為度治腳氣心腹脹滿兩膝疼痛高良薑湯高良薑厚朴當歸桂心各二錢生薑三斤水煎服治心腹絞痛如刺兩脅脹滿虛加芍藥半夏甘草人參乾薑蜀椒黃耆按此藥若胃火作嘔傷暑霍亂火熱注瀉心虛作痛者忌用豆蔻白豆蔻肉豆蔻三種功用略同主治開鬱破氣補胃健脾止瀉豆蔻分氣飲肉豆蔻十個炮草豆蔻仁藿香葉青橘皮各四兩甘草丁香各五錢烏梅五十個㕮咀每服四錢水二盞加糯米一撮煎至七分去滓溫服治臟腑虛寒泄瀉無度及婦人産後洞泄豆蔻香連丸肉豆蔻木香各一錢黃連炒三分研末粟米飯和丸米粒大每服十丸至二三十丸食前米飲湯下日夜各四服治泄利腸鳴腹痛縮砂仁主治通氣和中祛痰逐冷醒脾養胃化銅鐵縮砂散縮砂仁黃連木賊各等分研末每服二錢空腹米湯下治大腸虛熱脫肛紅腫誤吞金鐵等物濃煎縮砂仁湯飲之即下益智子主治和中調氣開鬱澀精益脾胃補腎虛益智和中湯益智仁五分白芍一錢五分歸身黃耆升麻炙草各一錢丹皮柴胡葛根半夏各五分桂枝四分肉桂一分乾薑炮二分研粗末水三盞煎至一盞去滓食後溫服益智和中益智散益智子一兩附子炮縮砂仁丁香厚朴黃耆白朮白茯苓陳皮川芎高良