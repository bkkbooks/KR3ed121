然汁和丸赤豆大每服十丸薑湯下治肺氣不調咳嗽喘滿痰涎壅塞心下堅滿及風痰嘔吐噁心半夏生薑大黃湯半夏二兩生薑一兩五錢大黃二兩水五升煮取三升分溫二服治反胃半夏厚朴湯半夏一錢厚朴八分神麯六分當歸梢豬苓京三稜升麻各四分肉桂蒼朮白茯苓澤瀉橘皮生黃芩草豆蔻仁生草柴胡各三分木香青皮各二分吳茱萸生乾薑黃連各一分紅花蘇木各五釐桃仁七個昆布少許水二鍾煎至一鍾服治婦人中脘痞滿噁心嘔逆一切郁證初起之屬寒屬實者半夏茯苓湯半夏一兩二錢五分赤茯苓熟地各七錢五分橘紅細辛紫蘇人參芍藥川芎桔梗甘草各五錢㕮咀每服五錢加生薑七片水煎服治妊娠心煩眩暈惡聞食氣好食鹽酸惡寒汗出多臥少起百節煩疼羸瘦多痰若有客熱煩渴口瘡去橘紅細辛加前胡知母各七錢五分腹冷下痢去地黃加桂心炒五錢胃中虛熱大便祕小便赤澀去地黃加大黃七錢五分黃芩二錢五分半夏茯神散半夏茯苓各一兩二錢天麻煨膽星遠志肉酸棗仁炒廣皮烏藥木香礞石煅各八錢研末每服三錢冰一鍾煎數沸加生薑汁數匙空腹和滓服治癲妄初病神氣未衰者半夏散半夏桂心各七錢五分赤茯苓人參陳皮前胡檳榔各一兩紫蘇葉一兩五錢㕮咀每服五錢水一中盞半加生薑七片淡竹茹二錢煎至七分去滓服治腳氣煩悶嘔逆心胸壅悶不能飲食半夏湯半夏二兩五錢栝蔞實一枚薤白二合銼片每服五錢水二鍾加生薑三片煎至一鍾去滓食前服日三次治胸痹心下堅痞急痛徹背短氣煩促自汗出半夏溫肺湯半夏制旋覆花人參細辛桂心甘草陳皮桔梗白芍各五錢赤茯苓七錢五分㕮咀每服四錢加生薑三五片水煎食後服治胃氣虛寒痰飲內阻胸腹氣冷口吐清水咳嗽嗜雜脅肋脹痛不欲飲食脈象遲弦沉細者按此實胃藥射干主治瀉火解毒消痰去熱咳逆上氣降實火利大腸咽喉腫痛尤為要藥射干丸射干炙草杏仁麩炒微黃各五錢升麻大黃微炒木鱉子各二錢五分研末蜜丸小彈子大每服一丸口中含化治懸癰腫痛咽喉不利射干連翹湯射干連翹玄參赤芍木香升麻前胡山梔仁當歸炙草各一兩大黃二兩㕮咀每服三錢水一盞煎至七分加芒硝少許食後溫服日三次治瘰癧寒熱射干麻黃湯射干細辛紫菀款冬花各三兩麻黃生薑各四兩五味子半夏各五合大棗七枚水一斗二升先煎麻黃兩沸去上沫納諸藥煮取三升分溫三服治水飲傷肺咳而上氣喉中水雞聲射干湯射干犀角升麻玄參黃芩麥冬大黃各一兩山梔子五錢㕮咀每服五錢加竹葉芒硝各一錢水煎服以利為度治癰疽發背諸瘡腫痛脈洪實數者又方射干酒洗梔子仁薑汁炒黑赤茯苓升麻各一兩赤芍一兩五錢白朮五錢研粗末每服五錢水二鍾煎至一鍾去滓入地黃汁一合白蜜五勺再煎不拘時溫服治胃脘癰日晡發熱每服加犀角丹皮各一錢甘草二分芫花主治咳逆上氣喘急寒痰水飲咽腫牙痛心腹脹滿四肢攣急惡瘡癰疽芫花丸芫花醋炒一兩牛膝狼牙根桔梗炒黃藜蘆炒檳榔各一兩五錢巴豆炒黑十粒研末醋煮米糊和丸赤豆大每服二三丸加至五七丸食前生薑湯下治飲癖酒瘕常服化痰消堅殺蟲芫花散芫花醋炒吳茱萸秦艽白殭蠶柴胡川烏巴戟研末溫酒調下治婦人鬼胎形如抱甕凝雪湯芫花一斤水三升煎取一升半漬故布上薄胸間不過再三薄熱則除治天行毒病七八日熱積胸中煩亂欲死芫根膏芫根一兩黑豆三合豬牙皂角五梃醋一斗先浸釜中三日以火煎二升去滓再入鐺中煎至一升加白礬煅細研三兩攪勻去火成膏攤帛貼日二易治魚臍疔
