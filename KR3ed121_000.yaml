body:
  text: 本草簡要方自敘蘆溝橋事變之後豫方旅居漢口二十七年秋入桂林寇禍日深武漢又陷歐戰未起國步之危甚於纍卵有數門人過桂知豫生活艱苦問此後出處豫曰如果國不幸而亡亭林船山所不敢學我其以青主先生為歸乎其實書畫無法則醫藥無宗派此言亦欺世而已三十二年秋世事日有轉機豫早托跡中國農民銀行衣食粗給公餘之暇乃編此書蓋中國之醫向不專精於識病而專重在用藥傷寒論一書所包之病多矣而統名之曰傷寒及其下藥乃各不同小兒驚風所包之病多矣而統名之曰急慢驚風及其下藥乃各不同諸如此類不一而足可知識病雖未確用藥故不誤也故中國之藥中國用藥之經驗皆有可取求中國醫理舍藥物之功用及用藥之經驗不談而徒泛論五行生剋虛無浮泛之理宜乎中醫之日以不振乎豫之輯述此書故專主於藥之功用及處方之公式欲使覽者知其精要所在也青主先生地下有知其一笑乎癸未冬海寧張宗祥記凡例一本草以綱目為最備然李瀕湖先生距今四百年藥品已日增多産地亦有變更如術之推於潛野生李氏所未詳今則於朮亦不可必得且乞靈於湖廣珠矣此因時代之變遷藥品功用因以不同不可不知者也一綱目所收丸散之方過略豫意非歷舉藥方不足以證是藥功用如以麝香配天麻則去風痰配雄黃則治疔腫可知用麝之意專取迅速而根本治病尚須他藥若即歸功麝香未免貽誤一中藥功用皆由經驗得來處方如何可求公式如黃連之治痢疾更重則加黃柏此中可得二藥殺菌之理然中醫處方決不單純既攻其病兼強其本故痢症必多用健胃助脾清腸之品甚或久痢施以強心之藥若非廣採藥方不能尋求真意一本草向定藥性溫熱寒涼言之綦詳豫意用藥專在功效性之寒溫無關於病使果泥於寒溫之說大黃附子何能並用如此之類不勝枚舉故刪藥性專言主治一藥味甘苦向亦詳載其實於病亦無關涉甘果和中則熟地有時礙胃苦如下降則羌活豈能祛頭面之風故藥味亦略而不載一痘症自牛痘盛行之後窮鄉僻壤盡能施種昔為兒科重症今則可以不談故痘症諸方悉皆從略一為醫不知各藥功用徒讀古書誤人不淺雖知藥之功用不明處方公式亦難臨診故本書編輯之旨即在使不知醫者能開卷恍然知醫者悟處方微妙一醫家治病重在證候證現何狀即須注意如果虛極無論為疔腫為痢疾為痧疹為一切其他雜病即當先顧根本不可專攻病患此尤處方者所宜知也一本書之意在使讀者有途轍可循識藥功用主其分量自當臨時斟酌不可泥於古書一石部及諸動物所收獨少者礦物提煉不精恐含雜質動物多殺生命可不用者即為省去故獨簡略一古方中多用㕮咀今雖仍用其名不必定泥其法海寧張宗祥輯述
