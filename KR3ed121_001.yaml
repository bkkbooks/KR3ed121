body:
  text: 卷之一水部溫泉主治殺皮膚中蟲療癬疥祛風痛助消化蓋源於硫黃故也亦有源出石灰者浴之傷目冰主治退熱消炎救急頗效非神志昏迷炎腫過甚者不必用按人身無論何處發炎發熱均屬病菌侵入與血戰爭之故體健毒甚戰爭力強熱度愈高高熱有摧殘心臟擾亂神經之虞暫時用冰勢非得已其實冰既不能助血亦復不能殺菌但可使雙方戰爭略形和緩而已非根本治療之法也火部艾火主治風冷風痛乾霍亂俗名𦍺螺痧以雷公霹靂散加麝香少許納臍中上貼極薄薑片以艾火炙之內服杭州胡慶餘堂闢瘟丹四肢冷處以榆皮或麥麩炒極熱薄絹裹四人分擦脈復始停十可活九火罐主治風痛風寒用小竹筒或瓷筒內燒淨紙乘火盛時以筒口貼患處吸牢不落能已表症石部紫石英石英含錳質作紫色主治溫中養肺心腹痛胃寒咳逆上氣紫石英丸紫石英研細水飛川烏頭炮川杜仲炒去絲禹餘糧火煅醋淬遠志肉澤瀉桑寄生桂心龍骨另研當歸人參肉蓯蓉酒浸石斛乾薑炮五味子甘草炙各一兩牡蠣煅川椒去目及閉口者炒出汗各五錢研細末蜜丸梧子大每服二十丸治婦人經乍多乍少時前時後或腹痛丹砂産貴州者良為水銀硫黃天然化合物先取上好者研末水飛三次或以絹袋盛砂用蕎麥灰淋汁煮三伏時取出流水浸洗過研粉飛曬方入藥主治通血脈定神志治驚癇塗瘡疥闢瘟疫下死胎亦能發汗更衣丸硃砂五錢蘆薈七錢生用研極細好酒少許和丸梧子大每服一錢二分好酒或米湯下治腸胃乾燥大便不通按此藥向以為久服通神不老其實水銀硫黃皆有毒修治得法毒可幸免否則必至毒發難治水銀主治安神墮胎殺蟲蝨療惡瘡制輕粉法水銀一兩白礬二兩食鹽一兩同研不見星鋪鐵器內用小烏盆覆之篩灶灰鹽水和封固盆口炭打二炷香取開粉升盆上即成又法水銀一兩皂礬七錢白鹽五錢同研如上升煉又法先以皂礬四兩鹽一兩焰硝五錢共炒黃為曲水銀一兩又曲二兩白礬一錢研勻如上升煉輕粉丸輕粉一錢雄黃丹砂各二錢半槐花炒龜板炙各一兩為末丸梧子大每服一錢冷茶下日二服七日愈治梅毒又方輕粉胡桃仁槐花炒研龜板炙紅棗肉各二錢研搗為丸分三服初日雞湯下二日酒下三日茶下治梅毒又方水銀一兩硃砂雄黃各二錢半白礬緑礬各二兩半研勻罐盛燈盞蓋定鹽泥固濟文武火煉升罐口掃收每以三錢入乳香沒藥各五分灑太乙膏上貼之絶效治癰疽梅毒凡服食水銀輕粉雖易收效然毒竄經絡或口齒腫爛或筋骨疼痛攣縮久則潰爛難愈致成廢疾或用輕粉墮胎或服之自盡其面色必慘青治服食中毒潰爛者內服紅棗丸外敷蝦蟆散附紅棗丸紅棗三斤杉木煮熟去皮核多取杉木灰研細末搗棗肉為丸彈子大每日任意服食不可間斷又方土茯苓一兩苡米銀花防風白蘚皮各一錢木瓜一錢半皂莢子四分水煎服氣虛加人參血虛加當歸日三服蝦蟆散蝦蟆大者一眼紅腹無八字文者不用硫黃三錢胡椒二錢納入口內將口捆緊外裹黃泥入炭火中燒泥團紅透取出用碗蓋住俟冷去泥取蝦蟆研末麻油調鴨翎或舊筆蘸敷患處忌鐵器其他中毒者用開口花椒不拘多少白湯吞下能裹之從大便出又方麻油黃蜜紅砂糖攪勻服之又方搗蘿蔔汁飲又方取麻油飲之又方多食生荸薺凡中毒齒縫出血臭腫者用貫衆三錢黃連二錢水煎俟溫再加黃連末二分漱口誤入耳中以黃金枕耳邊即出誤入肉內令筋攣以金物尉之亦出雄黃每三兩以甘草紫背天葵地膽碧稜花各五兩細銼活水入坩鍋中煮三伏時漉出搗如粉水飛澄去黑者曬乾再研用一法用米醋入蘿蔔汗煮乾用法制過有毒不可用主治伏暑泄痢化腹中瘀血治一切蟲獸毒制蛇虺尤特效為治瘡殺毒要藥雄朱散雄黃一分細研水飛過乳香細研白礬煅各一錢共研末每服一字二三歲兒五分陳米湯下日三次治小兒下痢頻仍日夜痛不可忍雄黃丸雄黃全蠍牙皂大黃鬱金各一錢巴豆十四粒麝香少許共研末米糊丸緑豆大清茶下五七丸治疔瘡大便祕或心腹痛取利止雄黃牡蠣散雄黃二錢牡蠣四錢研末蜜調重湯燉溫塗患處日五六次治天蛇毒初起紅痛雄黃散雄黃丹乳香沒藥各五錢粟米小粉炒三兩草烏南星絡石百合各一兩白芨二兩研末溫水調敷治癰疽發背又方雄黃硇砂蒼耳草燒灰研末醋調另用菊花搗爛薑汁調合為一再調清者服之濃者敷之治疔瘡紅升丹雄黃硃砂各五錢水銀二錢火硝四兩白礬一兩皂礬六錢先研礬硝入大銅杓內火酒一小杯燉化一干即起研細汞朱黃各藥亦研細合併研勻先以陽城罐用紙筋泥搪約一紙厚陰乾輕撲不使生裂紋裂則用泥補之極干再曬無裂紋方入藥罐口以鐵油盞蓋定加鐵梁盞上下用鐵鑻鐵絲扎緊棉紙捻條蘸蜜周圍塞罐口縫間外用熟石膏細末醋調封固盞上加炭火兩塊使盞熱罐口封固易干用大釘三釘地下罐安釘上底置堅大炭火一塊外砌百眼爐升三炷香第一炷用底火火大則汞先飛上第二炷用大半罐火以筆蘸水擦盞第三炷火平罐口用扇扇之頻頻擦盞勿令乾干則汞先飛上三香完去火冷定開看盞上約有六七錢刮下研極細瓷罐盛用須預以鹽滷調製罐稀泥用筆蘸調罐口勿令泄氣如罐上有緑煙起即汞走也更須多刷出煙處令固治一切瘡瘍潰後瘡口堅硬肉紫黑能拔毒去腐生肌雄黃蒼朮白芷蒜頭燒煙燻闢蛇虺毒蟲雄黃燒酒調塗治一切毒蟲咬按色紅晶明者為雄精紅者雄黃黃者雌黃質有良窳非産地分陰陽也石膏含水硫酸鈣古多椎碎生用今有用煅者然生者能表散有解肌發汗之功實勝煅者主治胃肺各種高熱腹痛脹滿傷寒下血濁傷火灼石膏末調水敷石膏大青湯石膏八錢大青黃芩各三錢蔥白四莖前胡知母梔子仁各四錢煎服治妊娠傷寒頭疼壯熱肢節煩疼石膏牡蠣湯石膏五錢牡蠣一兩研末每服方寸匕溫酒下治衄血石膏散石膏不拘多少研極細每服方寸匕日再治骨蒸外寒內熱四肢微瘦足趺腫大熱退為度按傷寒至十餘日熱度高壯發煩譫語或下血者當以此藥為君如心臟衰弱更當佐以黨參黃耆之類滑石先以刀刮淨研粉以牡丹皮同煮一伏時去丹皮用水淘過曬乾用主治通利瀉熱利竅逐凝血解燥渴療黃疸水腫腳氣吐血衄血金創血出諸瘡腫毒尤為石淋要藥滑石散滑石亂髮灰車前子木通各一兩寒水石二兩冬葵子一合銼散水一斗煮五升時時服治轉胞益元散滑石水飛六兩粉甘草一兩為末每服三錢中暑傷寒下痢實熱皆可用通乳豬肉麵湯下催生香油下磁石主治明目聰耳養腎臟強骨磁石丸磁石辰砂神麯先以磁石巨火煅醋淬七次研細水飛曬乾取淨二兩辰砂研細水飛曬乾取淨一兩用生神麯末和勻更用神麯一兩水和作餅煮浮為度和入前藥蜜丸梧子大每服十丸加至三十丸空腹米湯下治瞳仁散大視物昏昏如霧中或內外障及耳鳴耳聾磁石酒磁石搗細水淘去赤汁五兩天雄炮去皮臍山茱萸各二兩木通防風薯蕷菖蒲遠志去心芎藭細辛蔓荊子白茯苓乾薑炮肉桂甘菊花各一兩熟地三兩銼細和勻生絹袋盛酒二斗浸七日每日任性飲之治風邪上干於腦或入於耳久而不散經絡痞塞耳聽不聰誤吞針鐵者立以磁石棗核大環孔線穿吞拽之即出代赭石煅赤用醋淬三次或七次研水飛過用主治定哮安胎止反胃吐血鼻衄月經不止胞衣不下凡哮喘臥睡不得者此藥能平之傷寒無汗者用代赭石乾薑等分為末熱醋調塗兩手心合掌握之夾大腿內側臥溫覆得汗砒石近皆飛煉成霜故名砒霜化學名三氧化砷亦稱無水亞砷酸以砷燃燒於氧氣或空氣中製成或用砷化金屬在空氣中煅制之天然産生未飛煉者名砒黃主治殺一切蟲癬疥梅毒美皮膚內服及一錢殺人蓋砒力催血急行服過量則血脈憤張暴裂故中砒毒死者七竅流血以酒下者必死不救解砒毒方雞子十餘打入碗攪勻入明礬末三錢灌吐吐後再灌吐盡愈或用大黃明礬新汲水調灌取吐瀉或生鴨血趁熱灌或人尿人糞金汁灌總以吐瀉去毒為主服毒之人不宜仰臥恐毒入四肢難愈愈後忌煙酒薑椒百日敷藥中毒者以濕泥頻塗換毒入內胸膈疼痛或作吐瀉者飲冷米醋一二杯即止又方生草三兩煎濃汁和羊血半碗飲立吐不吐連用大黃二兩生草五錢白礬一兩當歸三兩水煎數碗飲之立瀉即生鹽有海鹽池鹽井鹽三種治疾功同主治健骨補腎解毒涼血殺蟲明目固齒脫陽虛症四肢厥冷不省人事小腹緊痛冷汗氣喘炒鹽尉臍下氣海取暖乾霍亂上不得吐下不得利冷汗湧出氣垂絶鹽一大匙熬黃童便一升合和溫服得吐下即愈霍亂腹痛炒鹽兩包一尉心腹一尉背令氣透霍亂轉筋欲死氣絶腹有暖氣以鹽實臍中艾灸鹽上七壯蘇牙痛每夜以鹽末封齦上有汁瀝盡乃臥數日愈痢疾日以淡鹽湯代飲可益血中水分兼潔腸胃服鹽滷者腹痛身蜷足縮腸結而死急搗肥皂汁灌之取吐再用豆漿連灌朴硝滷石産鹽地未煉者色雜紅黃有毒不可用初煉名朴硝再煉或成芒硝或成馬牙硝內服宜用芒硝馬牙硝若朴硝不用為宜主治去腸胃積聚攻堅化結通經脈利大小便月經破五淋散惡血壅熱療黃疸孕婦忌用碧雪方朴硝芒硝馬牙硝硝石石膏寒水石水飛各一斤甘草一斤水一斗煎取五升入諸藥同煎不住手攪令消熔得所入青黛一斤和勻傾盆內經宿結成雪為末或含咽或吹敷或水調服二三錢欲通利熱水服一兩治一切積熱天行時疾發狂昏憒咽喉腫塞口舌生瘡大小便不通腹中痞塊用朴硝一兩獨蒜一個大黃末八分搗作餅貼患處以消為度難産及胎死不下芒硝末二錢童便溫服奇效服乳石中毒胸煩熱結芒硝一錢蜜水調日三服小兒食積用艾葉搗軟入朴硝攪勻以布貼腹硬處裹之使睡明晨解之玄明粉製法用白淨朴硝十斤長流水一石煎化去滓露一夜去水取硝每一斗用蘿蔔一斤切片同煮熟濾淨再露一夜取出每硝一斤用甘草一兩同煮去滓再露一夜納大沙罐中鹽泥固濟厚半寸不蓋口置爐中以炭火先文後武煅之待沸定取瓦一片蓋定仍前固濟烈火煅之冷一伏時取出隔紙安地上盆覆三日出火氣研末每斤入生炙甘草末各一兩和勻瓶收用主治心熱煩躁五臟積滯通大小便按此藥較芒硝少流弊用以攻積最宜硇砂成分為氯化鈣多産於火山旁及燒過之石灰壙中主治蕩積破瘀止痛療積痢喉痹反胃硇砂丸硇砂一錢研木香沉香巴豆肉各一兩青皮二兩銅青五錢研先以木香沉香青皮同巴豆慢火炒令紫色去巴豆研為細末入硇砂銅青研勻蒸餅和丸梧子大每服七至十丸空心食前鹽湯下日二三次能通氣滯瀉癥結又方硇砂芒硝各一兩當歸雄黃桂心各五錢大黃炮三稜各二兩研末米醋一碗熬大黃末為膏次入余藥和丸梧子大每服十丸空腹溫酒下漸加至二十丸以利下惡物為度治婦人疝瘕及瘀血在臟腹脅攻痛又方硇砂木香各三錢黑附子二枚各重五錢以上正坐妥者炮製去皮臍剜作甕子破故紙隔紙微炒蓽茇各一兩先以硇砂研末水一盞續續化開納甕內火上熬干研末置附子甕內用剜出附子末填蓋口上復和成白麵裹之約半指厚慢炭火燒至黃色去面同木香等藥研為細末用原裹附子熟黃面為末醋煮米糊和丸梧子大每服十五至三十丸生薑湯下治積塊痃癖一切凝滯硇砂膏槐杏桃柳桑嫩枝各三尺浸麻油十斤中三日再入梔子六百個穿山甲六兩童子發鹽水洗四兩慢火煎枯去渣納飛黃丹一百兩收成膏候微溫再入沉香身上尉燥不見火兒茶各二兩血竭三兩琥珀象皮切片微炒各一兩冰片麝香各五錢硇砂四兩共研極細末和入膏內攪勻用時熱水燉化忌火功用去瘀軟堅消腫止痛治癰疽發背對口痰核瘰癧乳癤流注無名腫毒未成能消已成能潰硫黃用純黃者雜他色不可用主治助消化祛積聚止血殺疥蟲痢疾壯陽向為服食者所珍然易中毒不可信中硫黃毒白羊生熱血一碗服之神效硫艾湯倭硫黃三錢艾湯下治陰證傷寒極冷厥逆煩躁腹痛無脈危極服之得睡汗出解硫黃不二散硫黃一錢靛花一分研末涼水一杯調服治梅毒發於咽喉腐爛疼痛湯水難入者礬生用煅用各隨病證主治燥濕消痰解渴止血定痛性極收澀濕熱方熾積滯正多及陰虛咽痛陰冷腹痛者均大忌之化痰丸白礬一兩細茶五錢為末蜜丸梧子大小兒十丸大人五十丸茶下久服痰自大便中出斷根又方白礬一兩牙皂角五錢為末每服一錢溫水調下治中風痰厥四肢不收氣閉隔塞通關散礬三錢鐵銚內溶化入劈開巴豆三粒煎乾去豆研礬用之甚者以醋調塗治喉癰乳蛾又方白礬鹽花等分搽口中治牙關緊閉涎出自開又方白礬末盛入豬膽中風乾研末每吹一錢入喉取涎出治喉腫痛又方白礬硫黃各二兩銚內燒過入硃砂一分為末麵糊丸小豆大薑湯下十五丸治反胃嘔吐玉華丹白礬煅為末醋糊丸梧子大量人大小用木瓜湯下治伏暑泄瀉推車丸明礬二兩青礬一兩白麵半斤同炒赤醋煮米糊為丸梧子大棗湯下三十丸治黃腫水腫又方白礬甘草等分為末冷水服二錢治蛇蟲射工沙蝨等傷人口噤目黑手足直毒氣入腹壁鏡傷人必死白礬塗之漆瘡白礬湯拭刀斧金瘡白礬黃丹等分為末敷之最妙礬二兩水一斗五升煎三五沸泡兩足治腳氣攻心
