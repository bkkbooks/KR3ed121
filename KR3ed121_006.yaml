body:
  text: 卷之六木部二黃柏主治滋陰降火清熱殺蟲壯骨髓利下焦瀉膀胱相火補腎水不足肌膚赤熱氣逆脈衝黃疸骨蒸時行赤目目昏耳鳴鼻衄喉腫喉痹心熱心痛五臟結熱腸風痔血血痢下血陰痿消渴尿多小便不通婦人妊娠下痢陰蝕小兒囟腫臍瘡諸瘡作痛癰疽乳發凍瘡火毒瘡熱泡瘡頭瘡蟲瘡口瘡陰莖瘡黃柏丸黃柏五錢赤芍四錢研末米飯和丸麻子大每服一二十丸食前米飲下治小兒熱痢下血又方黃柏微炒銼當歸微炒銼各一兩研末煨大蒜和丸緑豆大每服七丸日三四次治小兒久白痢腹脹㽱痛黃柏散黃柏一兩五倍子二錢密陀僧甘草各一錢除柏外余均研末清水調敷柏上火炙三五次將柏切片臨臥貼之天明即愈治繭唇又方黃柏蜜塗炙乾白殭蠶炒去絲各等分研末摻患處治濕瘡又方黃柏大黃朴硝雞子殼寒水石各等分研末水調塗治湯火傷又方黃柏黃連防風各四錢胡椒五錢大楓肉枯礬各二錢大茴香花椒各三錢雄黃硫黃各五分檳榔二枚斑蝥十個潮腦一錢五分研末臘豬油調塗麻木者亦可擦癢而搔破者擦破處治手足皮枯破則如水窠或癢如疥癩並治雁來風黃柏湯黃柏黃連白頭翁升麻當歸牡蠣石榴皮黃芩寄生炙草各二分犀角艾葉各一分㕮咀水煎服治小兒下赤白痢如魚腦頭痛身熱或心煩壯熱及溫病熱盛下血如魚腦者厚朴主治溫中健脾益氣消痰暖胃化食調關節補腸胃祛積水破宿血傷寒中風驚悸冷痛霍亂轉筋氣血麻痹反胃嘔逆痰壅氣滯胸悶氣脹口吐酸水腹鳴洞瀉尿白五臟一切氣病婦人經閉産前後臟腑不安厚朴丸厚朴蜀椒去目微炒川烏炮去皮各一兩五錢紫菀菖蒲吳萸柴胡桔梗茯苓官桂皂角去皮弦炙乾薑炮人參各二兩黃連二兩五錢巴豆霜五錢研末蜜丸梧子大每服三丸漸加四七丸以利為度食後生薑湯下治反胃吐逆氣上衝心及秋冬間下痢此方春夏加黃連二兩秋冬再加厚朴二兩厚朴三物湯厚朴八兩大黃四兩枳實五個水一斗二升先煎朴枳至五升下大黃煮取三升溫服一升以利為度治腹滿痛大便祕厚朴七物湯厚朴八兩炙草大黃薑製各三兩大棗十枚枳實五枚桂枝二兩生薑五兩水一斗煮取四升溫服八合日三次治腹滿發熱十日脈浮而數飲食如故嘔加半夏利去大黃寒多加生薑至八兩厚朴麻黃湯厚朴五兩麻黃去節四兩石膏如雞子大一塊槌碎杏仁半夏五味子各五合乾薑細辛各二兩小麥一升水一斗二升先煮小麥熟去滓納諸藥煮取三升溫服一升日三次治咳逆脈浮喉中不利如水雞聲厚朴散厚朴薑汁炙人參訶黎勒煨去皮白朮黃連微炒地榆微炙各一分炙草乾薑炮各五釐肉豆蔻一枚為散每服五分粥飲調下日三四次治小兒脾胃不和洞泄下利羸瘦少食厚朴湯厚朴乾薑阿膠各四錢黃連六錢石榴皮艾葉各五錢水煎日服二次治久痢二三年不止又方厚朴薑汁炙枳殼高良薑檳榔朴硝各七錢五分大黃炒二兩研末每服三錢水煎溫服治乾霍亂又方厚朴陳皮各二兩炙草乾薑各五錢茯苓一兩㕮咀每服一兩水煎服治脾胃虛寒作脹時痛時止厚朴煎丸厚朴銼片生薑二斤切片水五升煮朴汁干焙朴乾薑四兩甘草二兩水五升再煮朴干去草焙薑朴為末又用棗肉生薑同煮熟去蘆搗棗肉和丸梧子大每服五十丸溫中降氣化痰進食去冷飲泄瀉嘔吐等症杜仲主治潤肝補腎益精氣堅筋骨健腰膝腎勞腎冷腰脊拘攣婦人胎漏胎墮杜仲丸杜仲薑製炒去絲續斷酒浸各二兩研末水煮棗肉和丸每服七十丸梧子大米飲下治妊娠二三月胎動腰痛欲墮按此藥二錢佐以桑寄生二錢夏枯草炒淡苓各三錢為治高血壓良方椿主治澀腸燥濕殺蛔蟲口鼻疳蟲疳𧈟疥𧈟肺胃積痰腸滑腸風精滑夢遺下血泄痢婦人血崩赤白帶下産後惡露不盡椿皮丸椿根白皮訶黎勒各五錢母丁香三十個研末醋糊丸梧子大每服五十丸治休息痢日夜無度腥臭難近臍腹微痛溫白丸椿根白皮不拘多少酒浸曬研酒糊丸梧子大每淡酒下五十丸治臟毒下血又方臭椿根去皮焙乾四兩蒼朮米泔浸焙枳殼麩炒各一兩研末醋糊丸梧子大每服五十丸日三次治脾毒腸風下血又方椿白皮一兩五錢乾薑白芍黃柏均炒黑各二錢研末醋糊丸梧子大每服空腹下一百丸治婦人白帶漆主治咳嗽腰痛絶傷補中續筋骨安五臟風寒濕痹殺三蟲削年深堅結之積滯破日久凝結之瘀血女人疝瘕經脈不通二聖丸濕漆一兩熬一食頃入乾漆末一兩和丸梧子大每服三四丸溫酒下治婦女血氣疼痛及丈夫疝氣忌漆人不可服萬應丸乾漆炒煙盡一兩牛膝一兩研末以生地汁一升入銀器中慢火熬俟可丸丸梧子大每服一丸加至三五丸溫酒下治月經瘀隔不來繞臍疝痛及産後血氣不調諸癥瘕等證又方乾漆柏子仁山茱萸酸棗仁各等分研末蜜丸梧子大每服十四丸溫酒下日二次治五勞七傷漆黃丸生漆雄黃另研皂角刺各四兩蟾酥麝香另研各三錢水三升先入皂角煎至一升去滓下漆煎沸候漆浮水乾不黏手即離火下他藥木槌研勻衆手為丸緑豆大每服五十丸熱酒下午時五更各一服治癘風赤腫硬痛不癢漆黃蟾酥丹生漆一斤鮮螃蟹四個瓷罐裝封口埋土中十四日足開看盡化成水去滓慢火煎焙乾為末入雄黃蟾酥末各二兩攪勻瓷罐收每服二錢溫酒下空腹臨臥各一服治大麻風乾漆丸乾漆炒煙盡芫花酒拌炒鱉甲醋塗炙硇砂各一兩桃仁麩炒木香不見火川烏鹽拌炒黃各五錢雄黃麝香另研各二錢五分研末醋煮麵糊丸緑豆大每服十丸食前湯下治伏梁心下有積如梁伏中漆毒成瘡者神麯生蟹黃調塗或韭葉搗汁敷或頻以鹽湯洗或白果樹葉煎水洗或乾荷葉一斤煎水洗凡服此藥倘為平日忌漆之人必須避免不用以免中毒如中毒可服化斑解毒湯附化斑解毒湯升麻石膏連翹牛蒡子炒研人中黃黃連知母黑參各一錢加竹葉二十片水煎服此湯本治丹毒楝實名金鈴子實主治瀉膀胱利小便祛大熱止上下部腹痛解大熱煩狂治諸疝蟲痔根皮主治疥癬遊風熱毒風疹惡瘡小兒壯熱殺蛔蟲利大腸楝實丸川楝子茴香吳茱萸陳皮馬藺花研末醋糊丸梧子大每服一錢漸加至二錢溫酒下治小腸氣又方苦楝子茴香各二兩附子炮一兩黃酒二升煎盡為度焙乾研末每末一兩入玄胡索五錢全蠍炒十八個丁香十八粒另研末和勻酒煮米糊丸梧子大每服五十丸空腹酒下治奔豚小腹痛痛甚加當歸煎酒下又方苦楝子碎酒浸茴香炒當歸各等分研末酒煮米糊丸梧子大每服三五十丸空腹酒下治赤白帶下如腰痛用四物湯四兩羌活防風各一兩煎湯下苦楝湯苦楝根皮一握切焙麝香少許水煎空腹服治蟲渴楝實丸川楝子四十九個分七處切取皮七個用小茴香五錢同炒七個用破故紙二錢同炒七個用黑牽牛二錢五分同炒七個用食鹽二錢同炒七個用萊蔔子二錢五分同炒七個用巴豆十四粒同炒七個用斑蝥十四個去頭足同炒揀去萊蔔子斑蝥巴豆三味入青木香五錢南木香官桂各二錢五分研末酒煮麵糊丸梧子大每服三十丸食前鹽湯下日三次治㿗疝腫痛大腎脹大槐實主治潤肝清膽益腎明目去五內邪熱治風眩涼大腸腸風五痔婦人乳瘕子臟急痛難産陰瘡濕癢皮主治止痛生肌中風身強直消癰腫喉痹氣痛風蟲牙痛臟毒下血爛瘡湯火傷花主治瀉熱涼血清火腸殺五臟蟲治皮膚風熱目赤咯血吐血喉痹腸風五痔臟毒下血婦人崩中漏血療癰疽發背梅毒槐子丸槐子仁二兩酸棗仁微炒覆盆子柏子仁車前子蔓荊子茺蔚子牛蒡子蒺藜子各一兩研末蜜丸梧子大每服三十丸空腹下治肝虛風邪上攻目光偏視又方槐子十四粒蒲黃炒一合研末蜜丸梧子大每服二十丸溫酒下治妊娠不足月腹痛欲産以痛止為效又方槐角去梗炒四兩枳殼麩炒當歸酒製地榆防風黃芩各二兩研末酒糊或神麯糊丸梧子大每服三錢空腹下治大腸火盛腸紅下血槐角利膈丸槐角炒半夏各五錢牽牛酥炙一兩五錢皂角一兩研末生薑煮糊丸梧子大每服三十丸食後服治風勝痰實胸滿及喘滿咳嗽槐角地榆湯槐角地榆白芍炒梔子炒焦枳殼炒黃芩荊芥加生地水煎服治痔漏脈芤下血槐花酒槐花四五兩微炒黃乘熱入酒二鍾煎十餘沸去滓熱服取汗治發背及一切瘡毒不問已成未成但焮痛者未成二三服已成一二服即愈槐枝酒取槐枝切碎煮汁和釀酒治大麻風瘙痹槐花散槐花炒皂莢去皮燒煙絶白礬熬沸定炙草各等分研末每服二錢熟酒調下治膈熱生痰嘔吐又方槐花炒一兩蒲黃五錢川面薑一分研末每服五分水調下治衄血又方槐花槐角炒研末羊血蘸藥炙熟食溫酒送下治脫肛又方槐花阿膠枳殼各八分當歸地榆各一錢生地白芍黃芩升麻各七分防風側柏葉各五分水煎服治吐血槐耆耆槐花一兩生耆五錢青蒿一兩生地紫蘇薄荷連翹各七錢天冬玄參天花粉各五錢黃柏三錢水煎服治疳蟲口乾火盛頭痛加白芷三錢川芎二錢秦皮主治除熱涼肝明目益精風寒濕痹目赤腫痛青翳白膜下焦虛熱痢下重婦人帶下小兒驚癇天蛇毒瘡秦皮散秦皮滑石黃連各等分每用五分湯泡乘熱洗治風毒赤眼昏暗羞明合歡主治安五臟消癰腫續筋骨折傷疼痛合歡散合歡皮炒黑四兩芥菜子炒一兩研末每服二錢溫酒臨睡服滓敷患處治撲損折骨皂莢主治利九竅闢瘟疫搜經絡消痰化食瀉肝利肺開胃拔毒風痹死肌骨蒸中風口噤口喎身面卒腫頭風腦宣急喉痹塞咳逆上氣胸中痰結堅症外腎偏痛便毒腫痛自縊將死研末吹鼻中婦人吹乳産難胞衣不下痙風癘疥癬一切腫痛便毒癰疽子刺功用略同皂角丸豬牙皂角枳殼羌活桑白皮檳榔杏仁麻仁防風白芷陳皮各等分研末和丸梧子大每服三五十丸蜜湯下治腸風大便祕澀有熱加大黃皂角刺丸皂角刺二兩燒煙盡存性防風槐花各七錢五分蛇床子白礬煅枳殼白蒺藜炒羌活各五錢蜂房炒焦五倍子各二錢五分研末醋調緑豆粉煮糊丸梧子大每服五十丸食前苦楝根煎湯下治痔漏或痛或癢時有膿血皂角苦參丸大皂角五兩苦參一斤荊芥十二兩白芷大楓子肉防風各六兩川芎當歸生何首烏大胡麻枸杞子牛蒡子炒威靈仙全蠍白附子蒺藜炒獨活牛膝各五兩草烏炮蒼朮炒連翹天麻蔓荊子羌活青風藤甘草杜仲酥炙各三兩白花蛇切片酥炙縮砂仁炒各二兩人參一兩研末醋打老米糊丸梧子大每服三四十丸食前後溫酒下避風忌口治粟瘡作癢日久膚如蛇蟲皂角化痰丸皂莢根白皮酥炙白附子炮半夏南星炮枯白礬赤苓人參各一兩枳殼炒二兩研末生薑汁煮麵糊丸梧子大每服三十丸食後下治勞風心脾壅滯痰涎盛多喉中不利涕唾稠黏嗌塞吐逆或時昏憒皂莢丸皂莢酥炙八兩研末蜜丸梧子大每服三丸棗膏和湯下治肺癰初起咳逆上氣吐濁又方蛇蛻七條蟬蛻白朮龍膽草玄精石生當歸白菊花茯苓木賊連翹赤芍刺蝟皮穿山甲穀精草各一兩五錢獖豬爪二十枚川芎五錢人參一兩研末一半入牙皂十二挺燒存性和研蜜丸梧子大每服一錢五分空腹杏仁湯下一半入仙靈脾一兩研和每服三錢用豬肝三片批開夾藥煮熟臨臥時細嚼用原汁送下治沉翳及內外障膜如十六般內障同生熟地黃丸用又方皂莢去皮弦蜜炙紫菀炙草桑白皮石菖蒲半夏各二錢明礬杏仁白醜頭末各一錢膽星一錢五分研末以百部一兩二錢煎膏為丸梧子大每服三四錢治久哮皂角散皂角燒灰蛤粉研等分和勻每服八字熱酒調下