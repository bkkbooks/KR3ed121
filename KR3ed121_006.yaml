炙草一兩人參白茯苓各一兩五錢半夏二兩銼散每服四錢加生薑大棗水煎食前服治産後虛煩頭痛短氣及婦人心虛驚悸天竺黃丹天竺黃一兩晚蠶蛾微炒白殭蠶微炒黃連各五錢硃砂青黛麝香各五分研末粳米和丸黍米大每服七至十丸人參湯下治小兒痰閉天竺黃散天竺黃五錢牛黃雄黃硃砂蘆薈麝香蟾頭炙令焦黃黃連犀角屑木香炙草鉤藤各一分龍腦一錢研細每服五分湯調下日三次治小兒乾疳又方天竺黃鬱金茯神甘草各五錢硼砂牙硝白芷川芎殭蠶炒去絲枳殼麩炒各二錢五分硃砂水飛二錢麝香一字蟬蛻十五枚研末每服五分至一錢薄荷或麥冬煎湯調下治上焦風熱口鼻生瘡兩目赤腫咽膈不利痰涎壅滯驚搐煩悶
