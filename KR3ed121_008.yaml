治血熱人中白散人中白煅紅二錢孩兒茶一兩冰片五分黃柏白硼砂薄荷青黛各六錢黃連五錢研末先用陳松蘿茶洗淨日吹五六次治小兒走馬牙疳口疳牙齦腐黑膿耳手臁瘡痔瘡吹後毒涎宜使外流痔瘡用麻油調敷又方人中白雞內金掛金燈子青黛鹿角灰蒲黃薄荷白芷冰片甘草研末吹治重舌喉蛾喉菌牙義舌根癰又方人中白一分麝香五釐蝦蟆塗酥炙焦蘆薈各五錢研末每服五分空腹臨臥熟湯調下治小兒疳氣寒熱積滯不化肚腹脹痛服後當下惡物秋石用童便一缸入石膏末七錢桑枝攪澄傾去清液如此三次以秋露水攪澄數次滌淨滓穢減除鹹味以重紙鋪灰上曬乾刮去在下重濁取清輕在上者用之主治退骨蒸潤三焦滋腎水軟堅塊虛勞痰嗽遺精白濁秋冰以秋石提煉之霜也功用同秋石四精丸秋石白茯苓各四兩蓮肉芡實各二兩研末蒸棗肉和丸梧子大空腹鹽湯下三十丸治思慮色欲過度損傷心腎遺精小便數秋石五精丸秋石一兩蓮肉六兩川椒紅五錢小茴香五錢白茯苓二兩研末棗肉丸梧子大空腹溫酒或鹽湯下三十丸補腎益氣紫河車即胞衣主治養血止血益氣補精治一切虛損勞極婦人子宮諸病經漏不止大造丸紫河車一具男用女胎女用男胎頭胎者米泔洗淨新瓦焙乾研末或以淡酒蒸熟搗爛曬乾研敗龜板童便浸酥炙黃二兩黃柏鹽酒浸炒杜仲酥炙各一兩五錢牛膝酒浸曬一兩二錢生地砂仁六錢拌入二兩五錢白茯苓二兩絹袋盛入瓦罐酒煮七次去茯苓砂仁不用杵地黃為膏聽用天冬麥冬人參各一兩二錢研末各不犯鐵器同地黃膏入酒米糊丸小豆大每服八九十丸空腹鹽湯下冬月酒下夏月加五味子七錢婦女去龜版加當歸二兩人乳煮糊為丸男子遺精婦女帶下並加牡蠣粉一兩治衰弱陰痿及婦女虧損等證河車丸紫河車初生男胎一具長流水洗淨煮熟擘焙研山藥二兩人參一兩白茯苓五錢研末酒糊丸梧子大麝香養七日每服三五十丸酒鹽湯任下治婦人骨蒸勞嗽
