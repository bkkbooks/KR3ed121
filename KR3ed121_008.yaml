body:
  text: 卷之八獸部豬肚主治補中益氣健脾豬肚丸柴胡赤苓人參黃耆各一兩黃連三兩地骨皮木香各五錢桃仁鱉甲各一兩五錢研末入嫩豬肚內縫合蒸爛於砂盆內研如膏丸成梧子大每服三十丸清晨午前二次治婦人熱勞羸瘦又方黃連粟米栝蔞根茯神各四兩知母麥冬各二兩研末入大豬肚內縫合蒸爛藥另研以豬肚為膏再入煉蜜搜和前藥拌勻為丸梧子大每服五十丸人參湯下治下元虛弱濕熱鬱結強中消渴小便頻數甚至夢遺白濁赤白帶下又方牡蠣煅透水飛白朮飯上蒸炒各四兩苦參酒浸曬七次三兩研末豬肚一具煮爛研膏和丸梧子大每服三十丸日三四次治小便頻數夢遺白濁肌肉消瘦婦人淋帶又方鱉甲童便醋共一分熱浸炙盡為度一兩白朮薯蕷各一兩胡黃連人參紫菀青皮桃仁木香炙草各五錢柴胡一兩一錢研末入豬肚內煮爛杵成丸梧子大每服二十丸治小兒肌熱消瘦狗肉主治補腎臟利血脈實下焦暖腰膝壯陽道填精髓治五勞七傷虛寒瘧疾狗寶生癩狗腹中狀如白石帶青色紋理層疊主治噎食反胃癰疽疔瘍戊戌丸黃童子狗一隻洗淨於砂鍋內用酒醋八分水二升入地骨皮一斤前胡黃耆肉蓯蓉各四兩煮一日去藥再煮一夜去骨再煮肉如泥入當歸末四兩蓮肉蒼朮末各一斤厚朴橘皮末各十兩甘草末八兩和杵千下丸梧子大每空腹鹽酒下五七十丸治男女一應虛疾骨蒸潮熱諸證又方五靈脂末以黃狗膽汁和丸龍眼大每服一丸酒化下治反胃不拘老少久遠不過三服愈又方五靈脂炒煙盡阿魏去沙研各等分黃狗膽汁和丸黍米大每服空腹下三十丸治痞塊疳積狗腦丸狗腦一個五加皮炙草防風白朮鐘乳石乾地黃各一分牛黃二分研末以狗腦為丸小豆大一歲兒每服二丸米飲下日二次治小兒喜搖頭解顱不知酌加狗寶丸狗寶一兩黑狗膽鯉魚膽各一枚蟾酥二錢蜈蚣炙七條硇砂乳香沒藥輕粉雄黃烏金石各一錢粉霜三錢麝香一分研末用首生男兒乳一合黃蠟三枚熬膏和丸緑豆大每服一至三丸白丁香七枚研調新汲水下腹臥取汗治癰疽發背初起壯熱煩渴者又方狗寶三錢硫黃水銀各一錢先以硫黃水銀同炒成金色入狗寶為末用雞子去白留黃和藥攪勻紙封泥固煻火煨半日取出研末每服五分燒酒調下治反胃膈氣狗皮無汗腺不泄氣故膏藥採用之羊肉補中益氣壯陽生血治五勞七傷羊肉生地湯羊肉一斤生地二兩人參當歸芍藥各一兩桂心川芎甘草各五錢先煮羊肉去滓煎藥分四服日三夜一次治産後三日腹痛補中益氣消癃有風熱去人參地黃肉桂加防風黃耆生薑咳嗽加紫菀款冬細辛五味腰痛加杜仲黃耆白朮附子萆薢又方羊肉一腳草果五枚粳米二升回回豆半升木瓜二斤煮取汁入砂糖四兩鹽少許煮肉食治腰膝痛腳氣羊肝丸白羯羊肝一片薄切新瓦上焙菟絲子車前子麥冬決明子白茯苓五味子枸杞子茺蔚子苦葶藶蕤仁地膚子澤瀉防風黃芩杏仁炒細辛桂心青葙子各一兩熟地一兩五錢研末蜜丸梧子大每服三四十丸日三次治青盲又方羯羊肝一具焙乾甘菊花羌活柏子仁細辛官桂白朮五味子各五錢黃連七錢五分研末蜜丸梧子大空腹下三四十丸治眼昏花能鎮肝明目又方縮砂仁一兩肉豆蔻五錢研末羊肝半具細切拌藥紙裹更以麵裹慢火燒令熟去紙面入軟飯搗丸梧子大食前粥飲下三十丸治休息痢羸瘦又方雄羊肝一具白蒺藜炒菊花石決明生地各一兩川芎三錢楮實子當歸尾槐角炒甘草黃連五味子各五錢荊芥穗二錢五分蕤仁七錢防風二錢研末取肝滾水沸過和藥搗丸梧子大每服五六十丸空腹薄荷湯下治目昏及病後翳牛黃牛肉補中益氣健腰腳返本丸黃犍牛肉去筋膜切片洗數遍仍浸一夜次日再洗三次水清為度用無灰好酒同入壇內重泥封固桑柴文武火煮一晝夜取出如黃沙為佳焦黑無用焙乾為末山藥蓮肉均鹽炒白茯苓小茴香炒各四兩為末每牛肉半斤入藥末一斤蒸紅棗去皮和搗丸梧子大每空腹酒下五十丸日三服補諸虛百損牛腦飲白芷川芎各三錢研末以黃牛腦搽末置瓷器內加酒燉熟乘熱食儘量一醉治偏正頭風不論遠近諸藥不效者牛黃生病牛膽中狀如雞子黃重疊可揭折主治清心安神瀉熱利痰驚癇寒熱牛黃八寶丹牛黃冰片青黛各二錢雄黃玄參各五錢羌活炒川蓮土炒羚羊角犀角貝母炒乳香沒藥各三錢珍珠四分硃砂五錢研末另用金銀花紫花地丁甘菊各二兩甘草五錢水五碗砂鍋內煎至半取汁滓絞乾桑柴火熬膏入煉蜜盞許再熬黏筋和丸每丸重三分每服二丸蜜湯下治痧證發斑發狂渾身赤紫痧復惡瘡毒瘍牛黃丸牛黃另研麝香另研各五錢虎睛一對蜣螂去頭足翅犀角屑安息香獨活茯神遠志炙草各一兩防風一兩五錢人參鐵粉另研硃砂另研龍齒另研各二兩研末蜜丸梧子大每服三十丸荊芥湯下治風癇虛乏痰在胸膈嘔吐煩悶又方西牛黃三分川連大黃銼炒各二兩麥冬焙一兩五錢硃砂五錢水飛麝香少許山梔仁馬牙硝川芎黃芩炙草各一兩研末蜜丸彈子大每服一丸食後竹葉湯化下治心脾壅熱口乾煩渴又方牛黃辰砂各三錢生川烏一枚重五錢去皮臍白花蛇酒浸取肉白附子全蠍天麻薄荷葉腦子另研各五錢雄黃五兩麝香一錢研末另以麻黃一兩酒一升煎至一盞去麻黃入蜜少許熬藥得所勿至焦赤衆手疾作丸芡實大金箔為衣每服五分之一金銀花薄荷湯磨化治驚風五癇天吊牛黃定心丸牛黃冰片全蠍殭蠶附子牛膝南星各五錢硃砂半夏各二兩雄黃天麻甘草烏蛇肉各一兩西珀七錢五分麝香二錢五分研末蜜丸芡實大每服一丸人參薄荷湯下治心臟中風昏迷牛黃抱龍丸牛黃琥珀各二錢五分西黃五分膽星一兩赤苓五錢全蠍辰砂各一錢五分白殭蠶三錢天竺黃三錢五分麝香二分研末取膽星煬化為丸每丸潮重四分金箔為衣每服一二丸鉤藤湯下治痰迷心竅神昏譫語手足拘攣癲狂瘋亂小兒急驚風牛黃清心丸牛黃一兩二錢另研白朮麥冬黃芩當歸防風白芍各一兩五錢柴胡桔梗川芎白茯苓杏仁炒各一兩二錢五分神麯炒蒲黃炒吉林參各二兩五錢羚羊角麝香另研龍腦另研各一兩肉桂大豆黃卷碎炒阿膠銼碎蛤粉炒各一兩七錢五分白蘞乾薑炮各七錢五分犀角屑二兩雄黃另研八錢乾山藥七兩甘草銼炒五兩金箔一千二百片內四百片為衣大棗一百枚蒸熟去皮核研成膏除棗杏仁金箔二角屑及二黃腦麝外余研末入余藥和勻以煉蜜及棗膏為丸每兩作十丸金箔為衣每服一丸食後溫水化下治諸風緩縱不隨言語謇澀心悸痰涎壅塞及心神不足喜怒無常或發狂癲小兒驚風角弓反張時發時醒又方牛黃輕粉各三分膽星一兩雄黃黃連各二錢茯神玄參天竺黃五倍子荊芥防風桔梗犀角屑當歸各一錢冰片麝香珍珠各五分研末甘草熬膏和丸龍眼大硃砂為衣每服薄荷湯磨化一丸治鎖喉風牛黃搜風丸牛黃木香各三錢大楓肉五兩陳皮當歸身山梔何首烏黃芩白芍黃柏五靈脂熟地白附子川芎皂角子青皮石菖蒲烏藥地骨皮枳殼北細辛羌活萆薢獨活連翹前胡藁本各一兩威靈仙苦參白殭蠶人參白朮防風血竭牛膝各三兩白芷草烏各五錢香蛇去骨酒浸炙一條研末米飯和丸梧子大每服七十丸清茶下治大麻風若紫塊血風加桃仁蘇木各二兩每服五六日發汗一次忌牛羊豬雞鴨等物及果品遠酒色戒憂怒慎寒暑牛黃膏牛黃二錢五分硃砂鬱金丹皮各三錢冰片甘草各一錢研末蜜丸子大每服一丸新汲水化下治熱入血室發狂牛黃散牛黃硃砂蝸牛肉全蠍白殭蠶天麻白附子乳香麝香各一分生龍腦一錢螳螂翅五對研末每服一字薄荷湯下治小兒赤白丹毒流走四肢初生兒用乳調少許塗口中胎疾永除又方牛黃防己各七錢五分犀角二錢五分羚羊角屑人參桂心牛蒡子炒生地炙草各五錢研末每服三錢水煎連滓服治舌本腫強黃明膠用牛皮熬成之膠主治滋陰活血肺破出血吐血衄血腎虛失精婦人妊娠下血胎動黃明膠散黃明膠炙乾花桑葉陰乾各二兩研末每服三錢生地汁調下治吐血馬蹄主治驚邪癲癇瘈瘲衄血內漏損傷瘀血婦人乳難血崩馬蹄丸白馬蹄禹餘糧各四兩龍骨三兩烏賊魚骨白殭蠶赤石脂各二兩研末蜜丸梧子大每服十丸不效加至三十丸空腹溫酒下治白漏不絶馬亦有寶不易得真者主治驚癇邪氣反胃驢阿膠阿井久涸今能用純黑驢皮以名泉熬膏已為上品主治清肺養肝滋腎補血利大小腸治癱瘓偏風一切風痛虛勞羸瘦肺痿吐膿咳嗽喘急吐血衄血心腹內崩水氣浮腫腰痛四肢骨節痠痛血淋尿血虛祕腸風下痢婦人血痛血枯經水不調或經行不止崩中帶下妊娠尿血胎動及胎前産後諸疾阿膠丸阿膠銼碎炒燥乾薑炮木香黃連炒當歸炒黃芩各一兩赤石脂醋煅水飛龍骨醋煅水飛各二兩厚朴一兩五錢研末蜜丸梧子大每服三十丸日二夜一次治冷熱不調傷犯三陰痢下膿血腹痛不已又方阿膠赤石脂各一兩五錢續斷川芎當歸甘草丹參各一兩龍骨鹿茸酥炙海螵蛸鱉甲炙各二兩研末蜜丸梧子大每空腹酒下二三十丸治産後崩血不止虛羸無力阿膠梅連丸阿膠草灰炒透明白研不細者再炒研三兩烏梅肉炒枯一兩五錢黃連三兩黃柏炒黑赤芍當歸炒赤茯苓各一兩五錢乾薑炮一兩研末醋煮阿膠為丸梧子大每服十至三十丸食前米飲下治陰虛下痢入夜發熱阿膠蘄艾丸阿膠蘄艾川芎當歸白芍熟地甘草研末水丸湯下治妊娠跌撲閃挫胎動不安阿膠散阿膠麩炒成珠一兩五錢牛蒡子炒香炙草各二錢五分馬兜鈴焙五錢杏仁麩炒七個糯米炒一兩生黃耆五錢研末每服一兩小兒二三錢食後水煎服治肺虛有火嗽無津液咳而哽氣者又方阿膠一兩熟地二兩白芍艾葉當歸甘草黃耆各一兩㕮咀每服五錢加薑棗水煎服治妊娠因顛撲胎動不安又方阿膠碎炒黃人參川芎各一兩白茯苓麥冬柴胡各七錢五分炙草當歸銼炒黃芩各五錢研末每服四錢加薑棗水煎服治胎動不安心煩腹痛阿膠湯阿膠炙燥熟乾地焙艾葉微炒川芎當歸切焙杜仲銼炙白朮各一兩㕮咀每服四錢加大棗水煎服治懷孕數墮胎小腹㽲痛不可忍又方阿膠一兩蒲黃六合生地三升水五升煎至三升分服治吐血又方阿膠炒三兩牡蠣燒粉鹿茸酥炙桑螵蛸酒炙各等分銼散每服四錢水煎空腹飲治遺尿虎骨主治去風健骨定痛骨節風痹攣急不得屈伸走疰疼痛腰腳不隨小兒驚癇虎骨丸虎骨醋炙四兩五靈脂炒白殭蠶炒地龍炒白膠香另研威靈仙各一兩川烏炮二兩五錢研末酒煮麵糊丸梧子大每服十至十五丸空腹溫酒下日二次治皮膚走注疼痛麻木困弱婦人當歸酒下撲打損傷豆淋酒下又方虎脛骨龜板均酥炙檳榔牛膝酒浸各一兩當歸大黃均炒木香桃仁炒海桐皮各七錢五分防風附子炮赤芍桂心血竭沒藥另研地龍炒各五錢研末蜜丸梧子大每空腹食前溫酒下各一次三十丸治婦人血氣血風攻疰腰腳骨節疼痛虎潛丸龜板酥炙黃柏鹽酒炒各四兩知母鹽酒炒熟地各二兩牛膝酒蒸三兩五錢白芍酒炒一兩五錢鎖陽酒潤虎脛骨酥炙當歸酒洗各一兩陳皮七錢五分冬月加乾薑五錢研末羯羊肉二斤酒煮搗膏丸梧子大每服三錢空腹鹽湯下治腎陰不足筋骨痿軟不能步履臁瘡筋骨痿弱下元虛冷精血虧損及骨蒸勞熱等證痿而厥冷加附子半枚虎骨木瓜丸虎骨酥炙木瓜楓樹葉龜版炙當歸自然銅血竭桂心乳香