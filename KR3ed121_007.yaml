body:
  text: 卷之七蟲部蜂蜜主治潤腸養脾益氣補中和營衛通三焦止痛解毒除衆病和百藥治心腹血刺痛蜜蠟主治補中續絶益氣下痢膿血孕婦胎動下血露蜂房主治驚癇瘈瘲惡疽附骨癰根在臟腑歷節腫出疔腫止風蟲牙痛洗乳癰蜜挺蜜二合銅器中微火煎候如飴狀攪入皂角細辛末少許至可丸乘熱捻作挺頭鋭大如指約長半寸納肛門內少頃即通大便凡傷寒便祕不可藥下者此法最良蜜柏散黃蘗不拘多少蜜炙灰色研細末臨臥乾摻治口瘡久不愈忌酒醋醬蜜髓煎蜜一碗豬骨髓五兩煮熟分十服日三次治中蠱毒腹內堅痛面目青黃病變無常蜂房膏露蜂房炙蛇蛻炙玄參蛇床子黃耆各三分杏仁一兩五錢亂髮雞子許大鉛丹蠟各二兩先以蜂房蛇蛻玄參蛇床黃耆銼碎綿裹酒浸一宿勿令酒多用油八兩納杏仁亂髮煎十五沸待發消盡綿濾更下鐺中然後下丹蠟又煎五七沸傾出瓷盆收貯每用少許貼瘡上一日一換治熱毒氣毒結成瘰癧蜂姜丸蜂房香附童便浸白殭蠶蛤粉栝蔞仁苦杏仁神麯各等分薑汁竹瀝加蜜為丸彈子大每服一丸噙化治酒嗽白蜜湯白蜜一兩生地汁一盞酒半盞生地及酒先煎五七沸入蜜攪勻分兩服治墮胎後惡血不出白蠟膏生地當歸各一兩麻油一兩煎藥枯黑去滓入白蠟一兩熔化攪勻冷即成膏每用少許搽患處治一切癰疽背疽湯火傷能生肌去腐止痛加乳香沒藥龍骨血竭兒茶輕粉尤妙五倍子百藥煎五倍子主治斂肺降火化痰止咳消渴盜汗嘔血失血嘔吐黃病久痢解酒毒熱毒蠱毒藥毒烏鬚髮斂潰瘡收脫肛治皮膚風疥喉痹心腹痛疝氣腸風女子房傷下血為末摻之孕婦胎漏為末酒服産後腸脫為末摻一切腫毒炒黑蜜調塗魚口便毒陳醋熬膏布攤貼百藥煎取五倍子研末每斤用茶葉一兩煎濃汁入酵糟四兩搗爛拌和器盛置糠中窖之待發酵如面狀即捏作餅曬乾用主治清肺化痰定喘解熱久痢脫肛大腸氣痔五倍子丸五倍子乾研為末蜜丸小豆大三歲兒每服三十丸治小兒大便下血五倍子散五倍子地榆各等分研末每服五分至一錢空腹米飲調下治小兒脫肛又方五倍子煅煙盡一兩黃蘗當歸炒膩粉漏蘆白礬煅各一分研末先用鹽水洗拭淨敷藥治癬久不瘥桑螵蛸螳螂之子生於桑上者主治益氣補精利小便通五淋男子虛損五臟氣微傷中陰痿夢遺女子血閉腰痛桑螵蛸散桑螵蛸三十個炒鹿茸酥炙黃耆各三兩牡蠣煨人參赤石脂厚朴各二兩研末每服二錢空腹米飲調下治産後元氣虛弱小便頻數又方桑螵蛸鹽炙遠志龍骨石菖蒲鹽炙人參茯苓龜板醋炙當歸各一兩研末每服二錢臨臥人參湯調下治健忘及勞傷心腎致小便頻數如稠米泔色又方桑螵蛸地龍貝母黃柏各五錢虢丹煅一兩乳香二錢五分粳米粉二錢麝香五分雄黃輕粉各一錢研末井水和砂糖調敷治諸惡瘡桑螵蛸湯桑螵蛸炙十枚當歸白朮米泔浸炒白茯苓官桂附子炮牡荊子磁石火煅醋淬菖蒲米泔浸焙乾地黃焙各一兩大黃銼炒細辛川芎丹皮各五錢㕮咀每服三錢匕先以水煮豬腎一雙取汁一盞煎服治虛損耳聾蠶白殭蠶主治散風去痰破結行經殺三蟲治中風風痰風疰偏正頭風皮膚風瘡丹毒作癢男子陰痿陰癢婦人崩中帶下産後腹痛乳汁不通小兒噤口久疳重舌木舌驚癇一切金瘡疔腫風痔鱗體蠶子紙主治腸風瀉血吐血鼻洪牙宣牙癰牙疳頭瘡喉痹小便淋閉婦人難産血露吹乳疼痛敷疔腫瘡毒雄原蠶蛾主治益精氣強陰道澀精壯陽暖水臟治暴風金瘡凍瘡湯火瘡滅瘢痕原蠶砂主治腸鳴熱中消渴風痹癮疹通關節筋絡治皮膚頑痹腹內宿冷冷血瘀血腰腳冷疼炒熱袋盛尉破癥結婦人血崩頭風赤眼白殭蠶散白殭蠶炒甘草細辛旋覆花木賊各五錢荊芥二錢五分嫩桑葉一兩研末每服七錢食後荊芥湯調下治迎風流淚又方白殭蠶炒一兩麝香二錢五分烏蛇肉炒黃蟬蛻桑螵蛸炒犀角屑天麻獨活天南星炮川烏炮白附炮硃砂水飛防風各五錢研末每服二錢溫酒調下日三次治婦人中風角弓反張口噤膚麻筋脈抽掣又方白殭蠶炒天麻獨活各一兩麻黃一兩五錢烏犀角屑七錢五分白附子炮半夏天南星炮藿香各五錢龍腦二錢五分研末每服一錢生薑薄荷湯調下日三次治妊娠中風口噤痰氣壅滯四肢僵直又方白殭蠶炒蠍梢等分天雄尖附子尖各一錢微炮為末每服一字或半錢薑湯調灌治小兒驚風仁存開關散白殭蠶炒白礬半生半燒各等分為末每服一錢生薑自然汁調灌治喉痹喉風服後吐頑痰立效小兒加薄荷生薑少許同調蠶蛾丸未連蠶蛾二升去頭翅足炒為末蜜丸梧子大每夜服一丸治丈夫陰痿蠶矢湯晚蠶砂木瓜各三錢生薏仁大豆黃卷各四錢黃連梔子炒各二錢半夏通草醋炒黃芩酒炒各一錢吳茱萸六分水煎服治霍亂吐利轉筋腹痛口渴煩亂危急之症又方蠶砂四兩炒半黃色黃酒一斤半入瓦罐煎滾濾去沙溫飲一二杯治經閉斑蝥主治潰毒墮胎蝕死肌破石癃利水道除血積疝瘕淋疾妊娠胎死燒研水服解蠱毒輕粉毒沙蝨毒一枚末服一枚燒研敷療癰疽研末蒜搗膏和水貼瘰癧鼠瘻惡瘡末敷瘋狗咬傷糯米炒黃去米研末空腹酒煎溫服中此藥毒者黃連靛青蔥茶大小黑豆汁生雞子各物任用灌取吐則毒解斑蝥膏斑蝥十四枚大蝮蛇一條首尾全曬乾黃酒七碗同藥入瓶內糠火煨至一碗去滓每用少許薄敷治白癩蠍主治諸風癮疹白風半身不遂口眼喎斜語澀手足抽掣耳聾疝氣痔瘡婦人帶下陰脫小兒驚癇蠍附散全蠍炮一錢五分附子炮三錢雄黃硃砂均水飛各一錢五分川烏炮麻黃去節南星薑製防風白殭蠶炒各三錢白芷藁本各五錢研末每服五分食後蔥茶調下治風邪頭痛夾腦痰壅嘔逆暗風旋暈牙關緊閉口眼喎斜面目瞤動頭項拘急肩背引疼四肢麻木孕婦忌服又方全蠍燒存性三錢五倍子炒一兩枯礬一錢麝香少許研末每用少許吹入耳中治耳內出膿蠍梢丸全蠍微炒白附子煨裂各五錢硫黃半夏各一兩研末薑汁丸麻子大每服三十丸荊芥湯下治小兒胎虛氣弱吐利生風或潮熱肢搐又方全蠍七個附子炮二錢天南星炮白附子炮木香各一錢㕮咀每服一錢加生薑五片水煎服治慢脾風水蛭主治逐惡血瘀血破血症積聚利水道墮胎婦女月閉欲成血勞折傷墜撲蓄血疼痛遊疹丹毒癰腫毒腫內傷神效方水蛭麝香各一兩銼碎燒令煙出研末酒服一錢治墜跌打擊蓄血疼痛又方紅蛭石灰炒黃半兩大黃牽牛頭末各二兩研末每服二錢熱酒調下治跌撲損傷瘀血凝滯心腹脹痛大小便不通欲死蟬蛻主治散上焦風熱頭風眩暈目昏障翳喉風喉痹白喉小兒驚癇壯熱破傷風疔腫毒瘡大人失音婦人生子不下蟬花蟬之一種主治小兒天吊驚癇瘈瘲夜啼心悸功效略同蟬蛻蟬殼散蟬蛻去足翅地骨皮黃連丹皮白朮蒼朮米泔浸切焙菊花各一兩龍膽草五錢甜瓜子五合研末每服一錢荊芥湯調下食後臨臥各一服治眼目風腫及生翳膜時疾後餘毒上攻眼目等症又方蟬蛻微炒半夏防己甘草炙各一分桔梗陳皮各五錢研末每服一字三歲上兒加至五分生薑湯調下治小兒痰壅咳嗽常作呀呷聲蟬殼湯蟬蛻微炒五味子湯洗七次焙乾人參各一兩陳皮炙草各五錢研末每服五分生薑湯調下治肺氣不利又方蟬蛻五錢水煎洗再溫再洗內服五苓散加燈心治小兒坐地中蚓或蟻毒陰囊腫大蟬蛻鉤藤飲蟬蛻一兩鉤藤鉤天麻茯苓川芎白芍各三錢甘草一兩加燈心水煎服治肚痛驚啼蟬蛻丸蟬蛻木賊甘菊各一兩荊芥穗川芎各二兩蒼朮米泔浸焙乾三兩炙草五錢研末蜜和成餅制錢大每服一餅食後細嚼蠟茶下日三次治目風冷淚兼去翳暈蟬蠍散蟬蛻二十一枚全蠍七枚天南星一枚甘草一分五釐研末每服二錢加生薑大棗水煎服治慢驚風蟬花散蟬花白殭蠶酒炒熱炙草各一分玄胡索五釐研末一歲兒每服一字四五歲五分蟬殼湯調下治驚風夜啼咬牙咳嗽及咽喉壅痛又方蟬蛻焙青黛各五錢蛇蛻燒存性一兩細辛二錢五分研末每服三錢溫酒調下日二次治犬咬蟲齧諸傷或諸瘡潰爛夏日生蛆及小兒痘爛生蛆蟬花無比散蟬蛻去頭足翅二兩蛇蛻酥炙一兩羌活當歸石決明鹽水煮一伏時漉出搗粉川芎各三兩防風茯苓炙草各四兩赤芍十三兩蒺藜炒八兩蒼朮童便浸切片麻油拌炒十五兩研末每服三錢食後清茶調下治一切風眼氣眼昏暗不明漸生翳膜及偏正頭風小兒痘瘡入目諸證䗪蟲主治破癥瘕攻瘀血行月經續折傷䗪蟲散土鱉隔紙炒鍋內焙乾六錢自然銅火煅醋淬七次二兩研末每服二錢溫酒調下治撲打傷接骨如神病在上食後服在下食前服大黃䗪蟲丸䗪蟲二十枚去足大黃二兩研末蜜和搗分成四丸每以酒一升煎一丸溫服治産婦腹痛有乾血積滯蟾蜍主治消腫拔毒療一切疔癰發背乳岩取活者一枚繫縛瘡上半日必昏憒置放水中救其命再換一枚重者剝其背皮貼瘡上或破其腹連肚乘熱合瘡上有膿即穿無膿即散連用三四次即愈無名腫毒惡瘡癢瘡癬瘡濕瘡蓐瘡月蝕耳瘡口瘡臍瘡均燒末油調敷五疳八痢溫病發斑用篤去腸生搗食或搗爛絞汁飲或燒研末服破傷風瘡跌撲損傷生研如泥劈竹裹縛住蟾蜍舊時取法不易現皆養蟾蜍壇中壇口蓋玻璃上置毛蟲蟾蜍見蟲即噴酥著玻璃上刮下待用既不傷生所得又多主治疔瘡走黃和麵為丸梧子大每用一丸置舌上即出余功同蟾蜍蟾灰散大幹蝦蟆一枚燒存性五倍子一錢麝香少許研末蜜水調塗治走馬牙疳五疳保童丸大幹蝦蟆一枚燒存性皂角去皮弦燒存性一錢蛤粉水飛三錢麝香一錢研末糊丸粟米大空腹米飲下三四十丸日二服治小兒面黃肌瘦好食泥土蟾酥丸蟾酥輕粉各一錢川烏蓮花蕊硃砂各一錢五分乳香沒藥各二錢麝香五分研末米糊丸豌豆大每服一丸重者二丸蔥白裹熱酒送下取汗治疔黃一切惡瘡飛龍丹蟾酥酒化雄黃各二錢輕粉銅緑枯礬寒水石煅膽礬乳香沒藥麝香各一錢硃砂三錢蝸牛二十一個先將蝸牛研爛同蟾酥和勻再入各藥末和丸緑豆大每服三丸蔥白五寸先嚼爛裹丸入蔥泥內無灰熱酒一茶鍾送下蓋被取汗治疔腫初起及諸惡瘡亦兼外用化腐消腫蟾酥餅蟾酥酒化乳香沒藥均去油明雄黃巴豆霜各二錢潮腦硃砂各一錢輕粉五分麝香三分研末即以蟾酥酒和丸緑豆大每用以口涎調貼外蓋膏藥治疔瘡腦疽乳癰附骨疽臀癰一切惡證或腫痛或不痛或麻木蜈蚣主治祛風散毒攻瘀症癖蛇瘕去三蟲小兒驚癇風搐臍風口噤蜈蚣散蜈蚣一對鰾三錢研末防風湯調下治破傷風又方蜈蚣五十條酒煮雄黃二錢生牛膝穿山甲生漆塗炙檳榔薏仁炒各一兩研末每服二錢溫酒調下出汗三日愈治癘風赤腫又方大蜈蚣一條全蠍七個雄黃三錢雞子清調敷外以豬膽皮套上治天蛇毒蜈蚣膏大蜈蚣八條長四五寸者小須二十條土木鱉二十四個麻油一斤先泡油內三日文武火熬起清煙去滓入黃丹四兩柳枝不住手攪至滴水成珠罐貯每用少許布攤貼治一切已破無名惡毒及毒蛇瘋狗百蟲咬傷蜈蚣入耳韭汁香油灌之皆可入腹急服生雞子二枚稍停服生油一盞即吐出蜈蚣咬傷取雄雞倒掛片時取雞口內涎沫塗傷處甚者飲生雞血立效蚯蚓主治瀉熱行水中風癇疾傷寒熱結大腹黃疸皆化水服喉痹利小便歷節風痛腎臟風疰小兒急慢驚風解中蠱下血醋漬死服殺蛔蟲炒末服地龍散地龍官桂蘇木各九分麻黃七分黃柏當歸梢甘草各一