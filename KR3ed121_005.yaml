body:
  text: 卷之五果部杏仁主治潤肺解肌下氣行痰散寒發汗消積消腫喉痹腹痹咳嗽上焦風燥大腸氣祕腳氣婦人乳少陰戶痛癢搗敷雙仁者有毒殺人杏子湯人參半夏茯苓甘草五味子芍藥各等分細辛乾薑桂枝各減半㕮咀每服四錢水一盞半加杏仁五枚生薑三片煎至六分溫服治氣水感冒加麻黃等分久年咳嗽氣虛喘急去杏仁人參倍加麻黃芍藥乾薑五味子杏仁桑皮湯杏仁一兩桑皮五錢生薑汁白蜜砂糖各一兩五味子紫菀各二錢通草貝母各四錢水煎服治暴咳杏仁散杏仁十四粒甘草款冬花各二錢胡黃連麝香各一錢半夏五錢研末每服一錢棗湯調下日二次治小兒肺疳杏仁煎杏仁麩炒微黃搗膏天冬寒食麵各一兩蜜酥各一合生地汁一大盞貝母微炒五錢先以水煎貝母天冬至五分研絞取汁入杏仁膏等同熬如稀餳每服五分溫水調下治小兒咳嗽心煩喘急量兒大小加減杏仁膏杏仁炒焦研末蔥汁和丸綿裹塞耳治耳中汁出或痛或膿杏仁龍膽散杏仁龍膽草當歸尾黃連滑石另研取末赤芍各一錢白沸湯泡燉不拘時蘸洗冷熱任意治風上攻目眊矂赤癢杏參散杏仁人參橘紅大腹皮檳榔白朮訶子麵裹煨去核半夏桂心紫菀桑白皮炙草各一錢水二鍾加生薑三片紫蘇七葉煎至一鍾溫服治隕墮驚恐喘息梅分烏梅白梅二種烏梅主治斂肺氣澀腸生津止渴調中醒酒去痹解毒消腫嘔逆各種痢婦人崩中下血白梅功用略同治刀箭傷止血研爛敷乳癰腫毒杵爛貼烏梅丸烏梅三百枚細辛桂枝附子炮人參黃柏各六兩乾薑十兩黃連一斤蜀椒炒當歸各四兩搗篩合治以苦酒浸烏梅一宿去核蒸之五升米下搗成泥和藥納臼中加蜜杵二千下丸梧子大食前服十丸稍加至二十丸日三次禁生冷滑臭治蛔厥吐蛔久痢凡久痢諸藥不瘥者去細辛附子人參黃柏桂枝改桂心烏梅土瓜湯烏梅捶破木瓜干各二錢麥芽炒甘草草果各一錢銼散加生薑五片水煎服治飲酒積熱熏蒸五臟津液枯燥專嗜冷物寒食烏梅散烏梅去核玄胡索甘草半生半炙各五錢乳香沒藥鉤藤鉤各二錢㕮咀每服二錢水煎空腹服治腹痛及初生孩臍下冷痛疝氣內吊等疾又方烏梅肉微炒罌粟殼蜜炒各等分研末每服二錢臨睡蜜湯下治久咳不已冰梅丸青梅二十枚鹽十二兩淹五日取梅汁入明礬三兩桔梗白芷防風各二兩豬牙皂角三十條俱為細末拌汁和梅入瓶收貯每用一丸噙咽治喉痹乳蛾梅仁湯梅仁四十九粒大黃三兩丹皮一兩七錢五分芒硝二兩五錢冬瓜仁四兩犀角鎊一兩五錢銼如麻豆大每服五錢水二盞煎至一盞去滓溫服治腸癰裡急隱痛大便祕澀以利下膿血二三行為度桃桃仁主治破血散瘀潤燥風痹骨蒸咳逆心腹痛癥瘕血滯血痞血結血祕血燥婦人熱入血室經水不通桃梟桃實著樹經冬不落正月採之中實者良一名桃奴主治宣肺氣療心痛殺精魅五毒中惡腹痛吐血婦人妊娠下血莖及白皮去胃熱療黃疸殺諸瘡蟲膠煉服可補精髓下石淋破血和血桃仁丸桃仁辰砂檳榔當歸各七錢五分水銀棗肉研令星盡二錢五分麝香阿魏麵裹煨沉香各五錢研末蜜丸梧子大每服十丸空腹桃湯下治婦人與鬼魅交通又方桃仁麩炒微黃川芎白朮柴胡人參生地酸棗仁微炒各一兩赤苓訶黎勒皮各七錢五分枳殼麩炒微黃赤芍各五錢研末蜜丸梧子大每服三十丸荊芥薄荷生薑煎湯下治婦人頭目昏重心神煩悶或時寒熱肢節疼痛不思飲食桃仁丹桃仁麩炒微黃丹皮白蒺藜微炒去刺桂心各五錢郁李仁二錢五分研末蜜丸黍米大每服十丸乳前溫酒下治小兒陰腫量兒大小加減桃仁四物湯桃仁二十五粒當歸尾川芎赤芍丹皮香附玄胡索各一錢生地紅花各五分水煎服治經來腹痛有火加黃連黃芩各一錢有痰加蒼朮枳殼各一錢桃仁芍藥湯桃仁五合芍藥川芎當歸桂心乾漆碎熬甘草各二兩細切水八升煎取二升五合分三服治産後腹痛桃仁承氣湯桃仁五十個大黃酒浸四兩甘草桂枝芒硝各二兩水七升煎取二升五合去滓納芒硝微沸食前溫服五合日三次治太陽病不解熱結膀胱其人如狂小腹急結及婦人敗血留經或經閉服後當微利月事沉滯或去大黃加鱉甲青皮柴胡當歸川芎桃仁湯桃仁半夏當歸牛膝桂心人參蒲黃丹皮川芎澤蘭葉各一錢赤芍生地各一錢五分甘草五分水二鍾加生薑三片煎至一鍾食前服治經水不調或淋漓不斷斷後復來狀如瀉水四肢虛倦不能飲食腹中堅痛不可行動經水或前或後經不來或月多思酸物又方桃仁蟅蟲各三十枚荊芥五錢大黃川芎各三兩當歸桂心甘草各二兩蒲黃五兩水煎取三升分三服治從高墮下腹中瘀血滿痛又方桃仁大黃炒丹皮芒硝犀角鎊冬瓜仁研各二錢水煎入犀角末服治腸癰腹中壅痛煩躁不安大便閉澀或繞臍生瘡桃仁散桃仁蘇木生地各五錢蟅蟲去足翅炒水蛭炒各三十枚研末每服三錢水一盞煎至六分去滓服治産後惡露忽斷絶腰中重痛下注兩股痛如錐刺又方桃仁當歸紅花牛膝等分研末每服三錢空腹溫酒調下治婦女血閉不通桃仁當歸湯桃仁二錢當歸尾酒洗玄胡索各一錢五分川芎生地赤芍炒吳茱萸青皮醋炒各一錢丹皮八分水二鍾加生薑三片煎至八分食前服治疝因瘀血作痛桃奴散桃奴五枚炙草一分麝香一錢細研杏仁二十枚桔梗赤芍黃芩柴胡升麻大黃微炒鬼臼各五錢搗散每服一錢水一小盞煎減半去滓服治小兒中惡心腹堅脹疼痛顏色青黑大便不通以利為度桃奴湯桃奴當歸人參乾薑炮川芎炙草桂心各三兩鬼箭犀角屑各一兩麝香研五分㕮咀每服四錢水二盞煎至盞半去滓溫服日二次治五尸及心腹暴痛腹脹加大黃一兩桃白散桃木白皮黃柏蜜炙黃連炒各一兩蛇蛻五錢燒灰乾蠍牛一分燒灰青州棗五十枚去核燒灰研細末入定粉麝香各一分研勻每服一字乳食前粥飲調下治腸胃俱虛腹內蟲動侵蝕下部疳痢濕𧈟棗主治補脾胃潤心肺調營衛治諸虛百損五勞七傷咳嗽怔忡血枯面白肢重肢酸婦人臟燥和陰陽生津液殺烏附天雄毒不論生熟皮皆難化帶皮食妨胃仁生熟分用安神穩睡止腹痛祛邪氣大棗丸山羊糞曬乾炒為炭存性研末大棗去皮核搗如泥和丸每服四錢黑棗湯下治潰瘍久不收口棗肉靈砂丸酸棗仁肉一錢靈砂二錢人參五分研末棗肉和丸緑豆大每服五七粒臨臥棗湯下治虛人失眠夢中驚魘自汗忪悸棗礬丸皂礬不拘多少置砂鍋中木炭燒炒通赤米醋點之研末棗肉丸梧子大每服二三十丸食後薑湯下治食勞黃棗膏丸陳皮苦桔梗甜葶藶炒研各等分研末棗肉丸梧子大每服二三十丸治息賁棗半湯酸棗仁二兩研細入水二杯取汁半夏二合煮爛入地黃汁一合更煮時時呷之治虛煩棗仁湯酸棗仁黃耆茯苓遠志蓮子各一錢二分人參當歸茯神各一錢炙草陳皮各五分水煎服治虛弱大棗湯大棗十五枚附子一枚甘草一尺黃耆四兩生薑二兩麻黃五兩㕮咀水七升煎取三升每服一升日三次治歷節疼痛紅棗散紅棗四兩去核燒枯明雄黃七錢五分勿經火枯礬犀牛黃梅花冰片銅緑煅麝香各一分研末收貯磁瓶用時以紅紙卷管吹入喉中治咽喉不通牙關緊閉不省人事吹後仰臥少時吐出濃痰以多為妙若爛喉痧吹入過夜即安梨主治清火潤肺消痰除煩止渴熱咳痰喘風痰火痰通大小腸腸胃積冷者忌服止咳方梨去核搗汁一碗入椒四十粒煎一沸去滓納黑餳一兩收成膏細細含咽立止暴咳又方梨剜空納小黑豆令滿蓋定繩系粳火煨熟搗作餅每日食之治痰喘氣急木瓜主治和脾舒筋斂肺理胃伐肝調營衛利筋骨去風濕治風痹水腫心腹脹痛腳氣衝心霍亂轉筋腰腳無力木瓜丸乾木瓜二兩熟地焙陳皮烏藥各四兩黑牽牛炒三兩石南藤杏仁當歸蓯蓉酒浸焙續斷牛膝酒浸各二兩赤芍一兩研末酒煮米糊丸梧子大每服三五十丸空腹木瓜湯或溫酒下治腎虛腰膝少力筋脈拘攣氣促面黑木瓜散木瓜酒浸虎脛骨醋炙五加皮人參桑寄生酸棗仁當歸柏子仁黃耆蜜酒炒各一兩炙甘草五錢㕮咀每服四五錢水一鍾半加生薑五片煎至七分去滓服治中風筋脈攣急腹痛轉筋舌卷囊縮木根湯木瓜子根皮一兩水煎服治霍亂轉筋腹痛余湯浸青布裹其腓或加桑葉七片尤良又方木瓜一兩茴香微炒二錢五分吳茱萸五錢炙甘草二錢每服四錢加生薑五片紫蘇葉十片水煎空腹服治吐瀉不已轉筋胸悶山楂主治和胃消食燒炭用去腸中積垢山楂丸山楂肉茴香各一兩炒研末糊丸梧子大每服百丸空腹服治偏墜疝氣又方山楂鹿茸炙等分研末蜜丸梧子大每服百丸日二次治老人腰腿痛柿根治血痢血崩蒂治咳逆噦氣氣虛寒厄霜治喉痛柿蒂湯柿蒂黃連黃柏生地側柏葉丹皮白芍木通茯苓澤瀉水煎服治血分濕熱柿蒂散乾柿蒂燒灰存性研末每服二錢空腹米飲調下治血淋柿錢散柿錢蒂如錢者丁香人參各等分研末水煎食後服治氣虛寒厄柿霜丸柿霜硼砂天冬麥冬各二錢玄參一錢烏梅肉五分研末蜜丸彈子大頻頻噙化治喉痛石榴酸者入藥主治赤白痢腹痛用皮根殺蛔蟲寸白蟲花止金創出血鼻衄九竅出血按石榴根一握煎湯溫服為殺蟲蠱特效之藥研末服亦可橘實潤肺生津化痰通氣皮青者名青皮主治消痰破滯散痞下食發汗疏肝膽舒氣鬱婦人乳腫小兒食積紅者名陳皮去白不用名橘紅功效略同青皮而攻病破氣之力較緩産化州者消痰順氣尤良故治肺寒咳逆當用陳皮核治腎冷腰痛小腸疝氣陰核腫痛絡能活血利氣通經絡濕滯祛皮膜間積滯葉可行經消腫散乳癰行肝氣橘半胃苓湯橘紅半夏各一錢蒼朮米泔水浸炒白朮炒厚朴炙甘草茯苓人參澤瀉茅根各二錢薑汁數匙水二鍾煎至一鍾入薑汁煎一二沸作十餘次飲治癰疽嘔吐不下食不知味橘術四物湯陳皮白朮當歸川芎白芍生地紅花桃仁水煎服治跌撲磕傷血滯體痛如骨節痛加羌活獨活痛不可忍加乳香沒藥橘皮半夏湯橘紅半夏各七兩銼碎每服三錢水二鍾加生薑三片煎至一中盞去滓服治肺胃虛弱好食生冷寒痰停積嘔逆噁心涎唾稠黏粥藥不下手足厥冷目眩身重或傷寒時熱欲吐不吐欲嘔不嘔昏憒悶亂或飲酒過多中寒停飲喉中涎聲乾噦不止橘皮竹茹湯橘皮二斤竹茹二升大棗三十枚擘生薑八兩炙草五兩人參一兩水一斗煮取三升溫服一升日三服治胃虛厄逆或加白朮枳殼柿蒂黃連橘皮枳朮丸陳皮枳實各一兩白朮二兩研末水丸梧子大每服二三十丸補脾和胃消食橘皮乾薑湯橘皮乾薑通草桂心甘草各四兩人參二錢㕮咀每服四錢水一盞煎至七分服治乾嘔吐逆橘皮湯陳皮紫菀麻黃杏仁當歸桂心甘草黃芩各等分㕮咀每服五錢水煎服治春冬傷寒秋夏冷濕咳嗽喉中作聲上氣不得下頭痛諸症又方橘皮茯苓半夏各一錢五分旋覆花青皮桔梗枳殼薑製細辛人參各一錢甘草五分水二鍾加生薑五片煎至一鍾食遠服治胸膈停痰又方橘皮枳殼炒槐花炒川芎各一錢五分桃仁炒木香檳榔紫蘇莖葉香附炙甘草各一錢水二鍾加生薑三片紅棗二枚煎至一鍾食前服治氣痔橘皮丸橘皮五兩甘草三兩三錢當歸萆薢蓯蓉吳茱萸厚朴肉桂巴戟石斛附子牛膝鹿茸杜仲乾薑陽起石菟絲子各一兩研末酒一升五合砂鍋內入橘皮末熬如飴再入諸藥末攪勻為丸梧子大每服五七十丸空腹鹽湯或溫酒下治脾癆陳皮半夏湯陳皮鹽水炒半夏茯苓各一錢黃芩酒製枳殼麩炒紫蘇各八分炙甘草五分加