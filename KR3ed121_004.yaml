石湯百合七枚滑石三兩碎綿裹代赭石一枚彈子大碎綿裹洗淨百合浸一宿換水二升煎取一升去滓另以水二升煎二石取一升去滓合煎取一升五合溫服五合治百合病誤下又散方百合炙一兩滑石三兩研末每服方寸匕米飲調下日三次治百合病變發熱微利止服熱則除百合雞子黃湯百合七枚擘雞子黃一枚如前法煮百合取一升納雞子黃攪勻煎至五分溫服治百合病吐後胃不和百合散百合蒸紫草茸洗赤苓白芍桔梗炒前胡貝母各一錢五分炙草五分水二鍾加生薑五片煎至一鍾服治妊娠風壅咳嗽痰多喘滿又方百合黃柏各一錢白芨二錢五分蓖麻子五十粒研末朴硝水作餅貼日三四次治頤頦生瘡又方百合川芎赤芍當歸生地側柏葉炒荊芥犀角丹皮黃芩炒黃連梔子鬱金大黃水煎加童便和服治打撲傷損敗血流入胃脘嘔黑血汁大便利者去大黃百合湯百合赤苓陳皮紫蘇莖葉人參大腹皮豬苓桑根白皮枳殼麩炒麥冬炙草各一兩馬兜鈴七枚粗搗每服四錢水一盞半加生薑棗大一塊煎至八分去滓服治肺氣壅滯咳嗽煩悶脘膈不利口渴腰膝腫小便淋澀又方百合水浸半日川芎當歸白芍荊芥各二錢水煎服治嘔吐百合膏百合一兩朴硝杏仁桑根白皮木通大黃天冬各五錢研末蜜丸黍米大每服十丸米飲下量兒大小加減能潤腸去積白冬瓜主治益脾補氣利二便消水腫消渴除煩療癰腫解熱毒子去皮膚風癢腸癰咳嗽冬瓜湯冬瓜切八合栝蔞一錢二分茯苓知母各八分麥冬五分粟米二合五勺水五升煮至一升四合布絞去滓溫服治小兒渴痢量兒大小加減又方冬瓜去皮瓤水煎清水陰涼任服治霍亂大渴又方冬瓜子五七十粒冰糖蒸湯飲治咳嗽久不愈絲瓜瓜主治除熱利腸暖胃補陽化痰涼血絡通經絡消浮腫治黃積血氣作痛疝痛卵腫二便下血腸風痔漏婦人崩中乳汁不下小兒胎毒療癰疽瘡腫葉療卵㿗癰疽疔腫癬瘡藤治腦漏齒䘌殺蟲解毒絲瓜散乾絲瓜燒存性研末溫酒調下治婦人血氣不行絲瓜葉膏絲瓜葉韭葉連須蔥各等分入石臼內研如泥熱酒沖和去滓服滓傅之病在左手傅左腋右傅右腋並傅脅下左足傅左胯右傅右胯在中敷心臍並用布縛候紅絲白為安治脈骨疔病者須令人抱持不可跌倒發顫跌倒者難救又方防風荊芥各一兩升麻半兩姜三片水一盞煎至半盞絲瓜子研取漿半盞和灌治卒然中風手足麻者羌活煎湯洗又方陳石灰新石灰絲瓜根葉韭菜根各等分搗千下作餅陰乾用時研末敷治刀創又方絲瓜藤近根者三五尺燒存性研末每服一錢溫酒下治腦崩鼻中時流臭黃水木耳以所生之木為主治之原通用者黑黃白三種黃白兩種均為補品入藥桑耳為多黃者又名金耳白者又名銀耳均富膠質主治滋陰補肺桑耳主治血衄傷風瀉血婦人崩中帶下月閉血凝男子痃癖桑木耳散桑木耳炙蝟皮炙黃羌活當歸炒各一兩枳殼炒二兩研末每服二錢食前粥飲下治痔疾肛邊癢痛又方桑木耳二兩巴豆一兩去皮五升米下蒸過和棗膏搗丸麻子大每服一二丸治留飲宿食
