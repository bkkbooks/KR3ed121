body:
  text: 卷之四草部三菟絲子主治補陰益精和營衛益氣力五勞七傷消渴虛冷腰痛膝冷久服悅顏色明目菟絲子丸菟絲子肉蓯蓉鹿茸各二兩香附制五味子各一兩雞內金桑螵蛸各五錢研末酒丸梧子大每服四錢鹽湯下治腎氣虛損五勞七傷面色黧黑目眩耳聾心忡氣短遺泄盜汗腳膝痠痛小便不禁陽事不舉五味子主治壯水鎮陽益精強陰明目止渴斂氣止咳治瀉痢瞳子散大肺有實熱者不可用五味子丸五味子益智仁炒肉蓯蓉酒浸焙巴戟天人參骨碎補土茴香炒白朮覆盆子白龍骨熟地牡蠣菟絲子各等分研末蜜丸梧子大每服七十丸空腹鹽湯下治脾胃虛寒泄瀉五味子湯五味子炒研五分桔梗炒炙草紫菀茸續斷竹茹桑白皮蜜炒各一錢生地二錢赤小豆一撮水煎空腹服治傷燥咳嗽有血痛引胸脅皮膚乾枯又方五味子炒杵二錢人參麥冬杏仁橘皮各二錢水二鍾加生薑三片紅棗三枚煎至一鍾去滓服治產後喘促脈伏而厥又方五味子三兩麻黃細辛紫菀黃芩炙草各二兩當歸焙人參桂心各一兩紫蘇子炒半夏三兩㕮咀每服四錢水一盞加生薑五片煎至六分去滓溫服治肺痹上氣咳逆五味子黃耆散五味子二錢黃耆麥冬熟地桔梗各五錢甘草二錢五分白芍二錢人參三錢研粗末每服四錢水一鍾半煎至七分去滓服日三次治咳血成勞覆盆子主治補虛續絕強陰健陽明目黑髮治勞損腎精虛竭陰痿澀小便此藥補益而無燥熱之弊然皆輔佐他藥以為用使君子主治殺蟲消積除虛熱健脾胃治白濁瀉痢小兒五疳蛔痛使君子丸使君子去殼切片瓦上焙檳榔酸石榴根皮銼焙大黃半生半炮各七錢五分除檳榔銼曬不經火余藥再焙同研末砂糖水煮麵和丸麻仁大每服三十至五十丸空腹淡豬肉汁或雞汁下治腹內蟲痛口吐清水又方使君子去殼二兩南星薑製檳榔各一兩研末蜜丸每服三錢早晨砂糖水下治小兒蛔蟲腹痛食勞發黃疳脹食積腹見青筋嘔吐喜食生米者麥一斤拌炒至藥黃色喜食茶葉茶葉拌炒喜食灰土灰土拌炒炒畢揀去木鱉子主治疳積痞塊痔瘤瘰癧惡瘡乳癰消結腫利大腸酒疸脾黃噤口痢疾風牙腫痛醋磨搽凡噤口痢用木鱉仁六個研泥分二分擘燒餅之半作一竅納藥蒸熱覆病人臍上一時再換可愈木鱉膏麻油三斤熬番木鱉一百四十七粒至黑脆撈起再入鋁粉炒黃三十兩徐徐投下成膏時頃入井水瓶內置露處出火一宿攤貼治一切風痛療跌打損傷腫痛瘡傷馬兜鈴子治肺熱咳嗽痰結喘促去肺中濕熱根利大腸治頭風蟲毒疔腫蛇蠱毒馬兜鈴丸馬兜鈴半夏杏仁各一兩巴豆廿一粒去皮油研巴豆杏仁另研余研細末再合研皂角膏子為丸梧子大雄黃為衣每服十丸烏梅兩枚煎湯臨臥服以利為度治多年喘嗽馬兜鈴散馬兜鈴桔梗人參甘草貝母各五錢陳皮大腹皮桑白皮紫蘇各一兩五味子二錢五分㕮咀每服四錢加生薑三片水煎服治妊娠咳嗽喘急馬兜鈴根湯根一兩銼細水一盞煎至八分去滓空腹服治五種蠱毒及草蠱毒入人咽刺痛欲死者服後吐蠱出愈未吐再服以快為度牽牛子分黑白二種黑名黑醜白名白醜主治逐痰淌飲通滯下氣利大小便腳腫水腫虛腫瀉蠱毒下冷膿功專行水性烈氣虛者忌之白主上焦痰飲壅滯氣逆大腸風秘氣分濕熱黑至瀉腎及脾胃濕熱利大小便牽牛丸黑醜玄胡索微炒補骨脂各二兩三味分炒分研以煨蒜研膏為丸梧子大每服五十丸食前蔥酒或鹽湯下治冷氣流注腰痛不可俯仰又方牽牛大黃檳榔雄黃研末水丸梧子大每服三錢治蟲聚又方黑牽牛一斤生搗末八兩余滓以新瓦炒香再搗取四兩蜜丸梧子大至重服三十五丸陳皮生薑湯臨臥下半夜未動再下三十丸治五般積氣成聚此方尋常行氣服十丸最妙紫葳花根功用同主治瀉血熱破瘀血喉痹熱痛婦人經閉產後血崩症瘕紫葳散紫葳肉桂赤芍白芷玄胡索當歸劉寄奴丹皮各等分紅花少許黃酒一鍾水二鍾煎服治經水不來發熱腹脹紫葳湯凌霄花天冬百合杜仲黃芩黃連萆薢牛膝防風菟絲子白蒺藜各等分水煎服治肝痿又方紫葳五錢地龍焙殭蠶全蠍均炒各七個研末每服二錢溫酒下治大風癘疾栝蔞仁主治潤心肺滑腸清咽瀉火滌痰結吐血消腫炒用補虛勞口渴根主治除腸胃中痼熱八疸唇乾口燥時熱狂疾通大小腸婦女月經乳汁消腫排膿生肌去撲損瘀血秋冬採根去皮寸切水浸逐日換水四五日取出搗泥以絹濾過澄粉曬乾即為天花粉栝蔞丸栝蔞實山楂半夏曲神麯各等分栝蔞瓤竹瀝和丸梧子大每服五十丸薑湯下治食嗽又方栝蔞實枳實麩炒桔梗半夏各等分研末薑汁和丸梧子大每服五七十丸食後淡薑湯下治胸膈痞痛徹背脅脹喘急妨悶火重者加黃連栝蔞托裡湯栝蔞一個銀花一兩蘇木五錢乳香甘草節沒藥各三錢酒煎分三服一日服盡渣焙為末酒糊丸彈子大當歸酒化下治跌撲損傷腫痛積久欲潰或氣血鬱結致成瘡瘍服之未成即消已成自潰栝石湯栝蔞仁九錢滑石一錢五分蒼朮米泔水浸炒南星赤芍陳皮各一錢白芷黃柏黃芩黃連各五分生草二分生薑三片水三鍾煎至一鍾服治破傷風攻裡之後裡熱不止者栝蔞子散栝蔞子連翹何首烏皂角仁牛蒡子微炒大黃微炒各一兩研末每服二錢匕食後溫酒下治瘰癧初起疼痛寒熱四肢不寧栝蔞牛蒡湯栝蔞仁牛蒡子炒研花粉黃芩梔子生研連翹皂角刺銀花生草陳皮各一錢青皮柴胡各五分水二鍾煎至八分入酒一杯和勻食遠服治乳癰乳疽寒熱往來栝蔞煎栝蔞一個熟者去仁以童便一升相和絞取汁酥一兩生草一分研末蜜二兩用銀鍋子慢火煎如稀餳每服五分粥湯調下日四五次治小兒久嗽不止心神煩悶量兒大小加減栝蔞薤白半夏湯栝蔞實一枚搗薤白三兩半夏五合白酒一斗不用酒者用枳實生薑煎取三升溫服一升日三次治胸痹不得臥心痛徹背栝蔞牡蠣散栝蔞根牡蠣各等分研末每服方寸匕米飲下日三次治百合病渴不瘥者栝蔞根湯栝蔞根四兩麥冬人參各三兩生乾地甘草各二兩土瓜根五兩大棗二十枚㕮咀水八升煎取二升五合分三服治產後血渴又方栝蔞根一錢石膏二錢碎葛根一錢五分人參炙草防風各五分水煎服治風溫無大熱而渴栝蔞桂枝湯栝蔞根桂枝生薑芍藥各三兩炙草二兩大棗十二枚㕮咀水九升微火煎取三升分溫三服取微汗汗不出啜熱粥發之治太陽經痙病栝蔞湯栝蔞根三兩桑螵蛸炙草黃連生薑各二兩人參三兩大棗五十枚水七升煎取二升五合分三服治產後溺數口渴忌豬肉冷水栝蔞瞿麥丸栝蔞根二兩瞿麥穗一兩薯蕷茯苓各三兩附子泡一枚研末蜜丸梧子大每服二三丸米湯下日三次不知加至七八丸以小便利腹中溫為度治小便不利有水氣口渴腹中冷天花散天花粉二兩甘草三錢銼碎每服二錢無灰酒一盞煎至七分空腹溫服不飲者水煎加黃酒少許治外腎腫痛栝蔞皮功用同仁而輕可祛肺火咳嗽口渴宜用之葛根主治消渴解肌發汗退大熱胸膈煩熱發狂消酒毒通小腸散鬱火破血排膿生用墮胎花主治腸風下血祛酒毒葛根牛蒡子湯葛根牛蒡子半生半炒貫眾甘草江西豆豉各二錢研碎每服三五錢水煎治時毒腫痛而便利調和者葛根麥冬散乾葛麥冬各一錢石膏升麻赤芍甘草茯苓人參各五分銼細加淡竹葉七片水一盞煎至七分服清肺胃邪熱葛根散葛根黃耆升麻麥冬栝蔞根赤芍梔子仁生地各一兩黃芩七錢五分生草五錢銼碎每服四錢水一中盞煎至六分服治癰腫熱甚口乾煩渴或乾嘔葛根湯葛根四兩麻黃三兩桂枝芍藥炙草各二兩生薑三兩切大棗十二枚擘㕮咀水一斗先煎麻黃葛根減二升去上沫納諸藥煎取三升去滓服取微汗治太陽與陽明合病或利或嘔或小便少或發熱無汗或喘滿不食或口噤不得語欲作剛痙又方葛根二錢梔子仁枳實麩炒豆豉各一錢炙草五分水一鍾煎至七分服治酒疸又方葛根二錢赤芍一錢五分赤茯苓甘草各五分水煎服治齒痛風勝加荊芥防風薄荷火盛加連翹生地丹皮牛蒡子葛根黃芩黃連湯葛根八兩黃芩黃連各三兩炙草二兩㕮咀水八升先煎葛根減二升納諸藥煎取二升去滓分溫再服治陽明病大熱下利或喘而汗出及酒客熱喘葛根解肌湯葛根前胡荊芥鼠黏子連翹赤芍蟬蛻木通各等分生草減半水煎服治麻疹初起發熱咳嗽葛根橘皮湯葛根橘皮杏仁知母炒黃芩麻黃炙草各五錢銼碎每服三錢水煎服治春溫初發肌肉斑斕癮疹如錦文心悶而咳嘔吐清汁及麻痘等症葛花解毒飲葛花黃連炒黑玄參當歸龍膽草炒茵陳甘草熟地茯苓梔子仁連翹車前子各等分水二杯煎至八分去滓食遠服治睛黃視渺葛花解酲湯葛花白豆蔻縮砂仁炒各五錢青皮蓮花各三錢木香五分橘紅人參豬苓白茯苓各一錢五分神麯炒澤瀉乾薑白朮炒各二錢研末每服三錢熟湯調下治飲酒過多嘔吐痰逆頭痛心煩胸膈痞塞手足顫搖小便不利大便泄瀉頻服取汗愈天門冬主治滋陰清火潤五臟保肺氣五勞七傷吐血消痰肺痿強陽久服滑腸天門冬丸天門冬去心十兩麥冬去心八兩生地三斤取汁熬膏研末生地膏和丸梧子大每服五十丸人參荊芥散煎湯下治婦人喘嗽手足煩熱骨蒸寢汗口乾引飲面目浮腫有風者宜先以麻黃桂枝發其汗又方天門冬一兩五錢百合前胡川貝煨半夏桔梗桑白皮防己紫菀赤苓生乾地杏仁炒黃研如膏各七錢五分研末蜜丸梧子大每服二十丸生薑湯下日三次治肺藏壅熱咳嗽痰唾稠黏又方天門冬乾土瓜根栝蔞根熟地知母焙肉蓯蓉酒浸鹿茸酒炙五味子赤石脂澤瀉各一兩五錢雞內金三具微炙桑螵蛸炙十枚左牡蠣煅二兩苦參一兩研末蜜丸梧子大每服二十丸食前粟米飲下治初得消中食已如飢手足煩熱小便白濁天門冬散天門冬去心焙桑白皮銼赤苓柴胡百合紫菀藍葉炙草各五錢搗碎每服一錢水一小盞加生薑少許煎至五分去滓服治小兒心胸煩悶體熱咳嗽天門冬湯天門冬遠志甘草煮黃耆白芍麥冬藕節阿膠蛤粉炒生地當歸沒藥各七分人參炙草各三分水二鍾加生薑三五片煎至一鍾服治思慮傷心吐血衄血天門冬酒冬月以天門冬去心煮汁同曲米釀服潤五臟和血脈久服治五勞七傷癲癇惡疾草棉主治止血散瘀益精補氣強筋骨助陽道治痔漏腸風大小便血血淋沙淋牙宣婦人經水過多下血血崩不止赤白帶下均可炒黃研末空腹服陰腎腫大煎湯洗除壁蝨拌雄黃末熏二三次仙傳蟠桃方棉花子取淨仁燒酒拌透下用水黃酒各半蒸一炷香紅棗黃酒煮熟取淨肉各一斤歸身牛膝枸杞均酒浸蓯蓉酒洗去泥甲山茱萸酒潤去核菟絲子酒蒸成餅白魚鰾麩炒成泡白茯苓人乳拌蒸破故紙鹽水炒熟地酒煮如飴各四兩淨巴戟酒洗去心五兩研末蜜丸早晚湯酒任下各三錢治諸虛百損長春丸魚鰾蛤粉炒成珠一斤棉花子取淨仁一斤去油盡酒蒸白蓮鬚八兩金櫻子去仁毛一斤金釵石斛八兩白蒺藜炒四兩枸杞子四兩五味子炒四兩研末另用鹿角五斤鋸薄片水煮三晝夜去角取汁熬膏和丸梧子大每服三錢治腎虛精冷等症健步仙方棉花子淨肉一斤燒酒三斤炒乾枸杞子酒浸杜仲鹽酒煮炒菟絲子酒炒破故紙酒炒胡桃仁各四兩歸身二兩研末蜜丸梧子大每空腹服三錢強腰腳補腎臟又方棉花子仁烏梅肉各六兩搗爛為丸梧子大早晚各服三錢治痔漏棉花子散棉花子炒黑六錢乳香三錢研末飯後紅糖黃酒下治中風口眼喎斜若癱瘓加